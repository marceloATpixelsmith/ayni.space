name: Safe Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: safe-auto-merge
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.state == 'open' &&
      !github.event.pull_request.draft &&
      startsWith(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - name: Ensure this is the current codex promotion PR
        id: promotion
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          current=$(gh api "repos/${REPO}/pulls?state=open&base=master&sort=updated&direction=desc&per_page=100" \
            --jq '[.[] | select(.head.repo.full_name == env.REPO and (.head.ref | startswith("codex/")))][0].number // 0')

          echo "most_recent_codex_pr=${current}"

          if [[ "$current" == "0" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$current" != "$PR_NUMBER" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "ℹ️ This is not the current promotion PR. Latest active codex PR is #$current, so auto-merge is skipped for this branch."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Update PR branch with latest master when possible
        if: steps.promotion.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          gh api \
            --method PUT \
            "repos/${REPO}/pulls/${PR_NUMBER}/update-branch" \
            --silent || true

      - name: Decide required checks from changed files
        if: steps.promotion.outputs.proceed == 'true'
        id: checks
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          files=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')

          require_lockfile=0
          require_backend=0
          require_admin=0

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            if [[ "$file" == *"/package.json" ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == ".github/workflows/lockfile-sync-check.yml" ]]; then
              require_lockfile=1
            fi

            if [[ "$file" == apps/api-server/* ]] || [[ "$file" == lib/db/* ]] || [[ "$file" == lib/api-spec/* ]] || [[ "$file" == lib/api-zod/* ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == "package.json" ]] || [[ "$file" == ".github/workflows/backend-regression-gates.yml" ]]; then
              require_backend=1
            fi

            if [[ "$file" == apps/admin/* ]] || [[ "$file" == lib/api-client-react/* ]] || [[ "$file" == lib/frontend-security/* ]] || [[ "$file" == lib/frontend-observability/* ]] || [[ "$file" == ".github/workflows/admin-security-shell-test-and-deploy.yml" ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == "package.json" ]]; then
              require_admin=1
            fi
          done <<< "$files"

          required=()
          if [[ "$require_lockfile" -eq 1 ]]; then
            required+=("Verify pnpm lockfile is up to date")
          fi
          if [[ "$require_backend" -eq 1 ]]; then
            required+=("Backend build/typecheck/test/codegen validation")
          fi
          if [[ "$require_admin" -eq 1 ]]; then
            required+=("Run admin security tests and build")
          fi

          required_checks_b64=""
          if [[ ${#required[@]} -gt 0 ]]; then
            required_checks_b64=$(printf '%s\n' "${required[@]}" | base64 | tr -d '\n')
          fi
          printf "required_checks_b64=%s\n" "$required_checks_b64" >> "$GITHUB_OUTPUT"

      - name: Wait until required checks for PR head SHA are successful
        if: steps.promotion.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REQUIRED_CHECKS_B64: ${{ steps.checks.outputs.required_checks_b64 }}
        run: |
          set -euo pipefail

          if [[ -z "${REQUIRED_CHECKS_B64:-}" ]]; then
            echo "No required checks for this PR based on changed files."
            exit 0
          fi

          REQUIRED_CHECKS=$(printf '%s' "$REQUIRED_CHECKS_B64" | base64 --decode)

          max_attempts=80
          sleep_seconds=30

          for attempt in $(seq 1 "$max_attempts"); do
            runs=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv')

            missing=0
            pending=0
            failed=0

            while IFS= read -r req; do
              [ -z "$req" ] && continue

              match=$(printf '%s\n' "$runs" | awk -F'\t' -v n="$req" '$1==n {print; exit}')
              if [[ -z "$match" ]]; then
                missing=1
                continue
              fi

              status=$(printf '%s' "$match" | awk -F'\t' '{print $2}')
              conclusion=$(printf '%s' "$match" | awk -F'\t' '{print $3}')

              if [[ "$status" != "completed" ]]; then
                pending=1
                continue
              fi

              if [[ "$conclusion" != "success" ]]; then
                failed=1
                continue
              fi
            done <<< "$REQUIRED_CHECKS"

            if [[ "$failed" -eq 1 ]]; then
              echo "At least one required check failed."
              exit 1
            fi

            if [[ "$missing" -eq 0 && "$pending" -eq 0 ]]; then
              echo "All required checks succeeded."
              exit 0
            fi

            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for required checks."
          exit 1

      - name: Force-promote PR head onto master (conflict-free zero-friction mode)
        if: steps.promotion.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Overwrite master with PR head and close PR
        if: steps.promotion.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout master
          git reset --hard "$HEAD_SHA"
          git push --force origin master

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "✅ Zero-friction promotion applied: master was force-updated to PR head SHA \`$HEAD_SHA\`."
          gh pr close "$PR_NUMBER" --repo "$REPO" --delete-branch
