name: Safe Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - master

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: safe-auto-merge
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref == 'master' &&
      github.event.pull_request.state == 'open' &&
      !github.event.pull_request.draft &&
      startsWith(github.event.pull_request.head.ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - name: Ensure this is the current codex promotion PR
        id: promotion
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          current=$(gh api "repos/${REPO}/pulls?state=open&base=master&sort=updated&direction=desc&per_page=100" \
            --jq '[.[] | select(.head.repo.full_name == env.REPO and (.head.ref | startswith("codex/")))][0].number // 0')

          echo "most_recent_codex_pr=${current}"

          if [[ "$current" == "0" ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$current" != "$PR_NUMBER" ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "ℹ️ Auto-merge skipped: this is not the newest codex/* promotion PR. Latest active codex PR is #$current."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"

      - name: Gather PR context and changed files
        if: steps.promotion.outputs.proceed == 'true'
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          pr=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
          head_ref=$(jq -r '.head.ref' <<< "$pr")
          head_sha=$(jq -r '.head.sha' <<< "$pr")
          mergeable_state=$(jq -r '.mergeable_state // "unknown"' <<< "$pr")
          mergeable=$(jq -r '.mergeable // "unknown"' <<< "$pr")

          compare=$(gh api "repos/${REPO}/compare/master...${head_sha}")
          behind_by=$(jq -r '.behind_by // 0' <<< "$compare")
          compare_status=$(jq -r '.status // "unknown"' <<< "$compare")

          files=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')
          files_b64=$(printf '%s' "$files" | base64 | tr -d '\n')

          echo "head_ref=${head_ref}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${head_sha}" >> "$GITHUB_OUTPUT"
          echo "mergeable_state=${mergeable_state}" >> "$GITHUB_OUTPUT"
          echo "mergeable=${mergeable}" >> "$GITHUB_OUTPUT"
          echo "behind_by=${behind_by}" >> "$GITHUB_OUTPUT"
          echo "compare_status=${compare_status}" >> "$GITHUB_OUTPUT"
          echo "changed_files_b64=${files_b64}" >> "$GITHUB_OUTPUT"

          echo "PR number: ${PR_NUMBER}"
          echo "Head branch: ${head_ref}"
          echo "Head SHA: ${head_sha}"
          echo "Initial mergeable_state: ${mergeable_state}"
          echo "Initial mergeable: ${mergeable}"
          echo "Behind master by commits: ${behind_by}"
          echo "Compare status vs master: ${compare_status}"
          echo "Changed files:"
          if [[ -z "$files" ]]; then
            echo "- <none>"
          else
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              echo "- $f"
            done <<< "$files"
          fi

      - name: Attempt update-branch if PR is behind master
        if: steps.promotion.outputs.proceed == 'true' && steps.context.outputs.behind_by != '0'
        id: update_branch
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "Branch is behind master; attempting GitHub update-branch for PR #${PR_NUMBER}."

          if gh api --method PUT "repos/${REPO}/pulls/${PR_NUMBER}/update-branch" --silent; then
            echo "update_result=success" >> "$GITHUB_OUTPUT"
            echo "update-branch succeeded. A new synchronize event should re-run checks on the refreshed head."
            exit 0
          fi

          echo "update_result=failed" >> "$GITHUB_OUTPUT"
          echo "update-branch failed (likely conflict while rebasing onto latest master)."

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ Auto-merge blocked: this codex PR cannot be updated cleanly onto current master. Likely cause: stale branch or overlapping codex changes. Please recreate this branch from latest master and re-open the PR."
          exit 0

      - name: Stop auto-merge after failed update-branch
        if: steps.promotion.outputs.proceed == 'true' && steps.update_branch.outputs.update_result == 'failed'
        run: |
          echo "Stopping auto-merge: update-branch failed due to stale/conflicting branch."
          echo "A PR comment was posted with remediation steps."

      - name: Refresh PR context after update attempt and fail fast on conflicts
        if: steps.promotion.outputs.proceed == 'true' && steps.update_branch.outputs.update_result != 'failed'
        id: mergeability
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          echo "update_branch_result=${{ steps.update_branch.outputs.update_result || 'not_needed' }}"

          mergeable_state="unknown"
          mergeable="unknown"
          current_head_sha=""
          current_head_ref=""

          for attempt in $(seq 1 20); do
            pr=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}")
            mergeable_state=$(jq -r '.mergeable_state // "unknown"' <<< "$pr")
            mergeable=$(jq -r '.mergeable // "unknown"' <<< "$pr")
            current_head_sha=$(jq -r '.head.sha' <<< "$pr")
            current_head_ref=$(jq -r '.head.ref' <<< "$pr")
            echo "mergeability probe ${attempt}: head_ref=${current_head_ref} head_sha=${current_head_sha} mergeable_state=${mergeable_state}, mergeable=${mergeable}"

            if [[ "$mergeable_state" != "unknown" ]]; then
              break
            fi

            sleep 3
          done

          files=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files?per_page=100" --paginate --jq '.[].filename')
          files_b64=$(printf '%s' "$files" | base64 | tr -d '\n')

          echo "head_ref=${current_head_ref}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${current_head_sha}" >> "$GITHUB_OUTPUT"
          echo "mergeable_state=${mergeable_state}" >> "$GITHUB_OUTPUT"
          echo "mergeable=${mergeable}" >> "$GITHUB_OUTPUT"
          echo "changed_files_b64=${files_b64}" >> "$GITHUB_OUTPUT"

          echo "PR number: ${PR_NUMBER}"
          echo "Head branch: ${current_head_ref}"
          echo "Head SHA: ${current_head_sha}"
          echo "mergeable=${mergeable}"
          echo "mergeable_state=${mergeable_state}"
          echo "Changed files (post-update check):"
          if [[ -z "$files" ]]; then
            echo "- <none>"
          else
            while IFS= read -r f; do
              [[ -z "$f" ]] && continue
              echo "- $f"
            done <<< "$files"
          fi

          if [[ "$mergeable" == "false" ]] || [[ "$mergeable_state" == "dirty" ]] || [[ "$mergeable_state" == "blocked" ]]; then
            echo "PR is conflicted/unmergeable: mergeable_state=${mergeable_state}, mergeable=${mergeable}"
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "❌ Auto-merge stopped: this codex PR is stale or conflicted against current master (mergeable=${mergeable}, mergeable_state=${mergeable_state}). Likely cause: stale branch base or overlapping codex PR changes. Please recreate the branch from latest master and open a fresh PR."
            exit 1
          fi

      - name: Decide required checks from changed files
        if: steps.promotion.outputs.proceed == 'true' && steps.update_branch.outputs.update_result != 'failed'
        id: checks
        env:
          CHANGED_FILES_B64: ${{ steps.mergeability.outputs.changed_files_b64 }}
        run: |
          set -euo pipefail

          files=$(printf '%s' "$CHANGED_FILES_B64" | base64 --decode)

          require_lockfile=0
          require_backend=0
          require_admin=0

          echo "Changed files detected for required-check selection:"
          if [[ -z "${files}" ]]; then
            echo "- <none>"
          else
            while IFS= read -r changed_file; do
              [ -z "$changed_file" ] && continue
              echo "- ${changed_file}"
            done <<< "$files"
          fi

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # lockfile-sync-check.yml pull_request paths
            if [[ "$file" == */package.json ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == ".github/workflows/lockfile-sync-check.yml" ]] || [[ "$file" == .github/workflows/* ]]; then
              require_lockfile=1
            fi

            # backend-regression-gates.yml pull_request paths
            if [[ "$file" == apps/api-server/* ]] || [[ "$file" == lib/db/* ]] || [[ "$file" == lib/api-spec/* ]] || [[ "$file" == lib/api-zod/* ]] || [[ "$file" == packages/* ]] || [[ "$file" == scripts/* ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == "package.json" ]] || [[ "$file" == ".github/workflows/backend-regression-gates.yml" ]] || [[ "$file" == .github/workflows/* ]]; then
              require_backend=1
            fi

            # admin-security-shell-test-and-deploy.yml pull_request paths
            if [[ "$file" == apps/admin/* ]] || [[ "$file" == lib/api-client-react/* ]] || [[ "$file" == lib/frontend-security/* ]] || [[ "$file" == lib/frontend-observability/* ]] || [[ "$file" == packages/* ]] || [[ "$file" == scripts/* ]] || [[ "$file" == ".github/workflows/admin-security-shell-test-and-deploy.yml" ]] || [[ "$file" == "pnpm-lock.yaml" ]] || [[ "$file" == "pnpm-workspace.yaml" ]] || [[ "$file" == "package.json" ]]; then
              require_admin=1
            fi
          done <<< "$files"

          if [[ "$require_admin" -eq 1 ]]; then
            echo "frontend_scope=true"
          else
            echo "frontend_scope=false"
          fi

          if [[ "$require_backend" -eq 1 ]]; then
            echo "backend_scope=true"
          else
            echo "backend_scope=false"
          fi

          required=()
          if [[ "$require_lockfile" -eq 1 ]]; then
            required+=("Verify pnpm lockfile is up to date")
          fi
          if [[ "$require_backend" -eq 1 ]]; then
            required+=("Backend build/typecheck/test/codegen validation")
          fi
          if [[ "$require_admin" -eq 1 ]]; then
            required+=("Run admin security tests and build")
          fi

          required_checks_b64=""
          if [[ ${#required[@]} -gt 0 ]]; then
            required_checks_b64=$(printf '%s\n' "${required[@]}" | base64 | tr -d '\n')
          fi
          printf "required_checks_b64=%s\n" "$required_checks_b64" >> "$GITHUB_OUTPUT"

          echo "Final required checks list:"
          if [[ ${#required[@]} -eq 0 ]]; then
            echo "- <none>"
          else
            printf -- "- %s\n" "${required[@]}"
          fi

      - name: Wait until required checks for PR head SHA are successful
        if: steps.promotion.outputs.proceed == 'true' && steps.update_branch.outputs.update_result != 'failed'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ steps.mergeability.outputs.head_sha }}
          REQUIRED_CHECKS_B64: ${{ steps.checks.outputs.required_checks_b64 }}
        run: |
          set -euo pipefail

          if [[ -z "${REQUIRED_CHECKS_B64:-}" ]]; then
            echo "No required checks for this PR based on changed files."
            exit 0
          fi

          REQUIRED_CHECKS=$(printf '%s' "$REQUIRED_CHECKS_B64" | base64 --decode)

          max_attempts=80
          sleep_seconds=30

          for attempt in $(seq 1 "$max_attempts"); do
            runs=$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" --jq '.check_runs[] | [.name, .status, (.conclusion // "")] | @tsv')

            missing=0
            pending=0
            failed=0

            while IFS= read -r req; do
              [ -z "$req" ] && continue

              match=$(printf '%s\n' "$runs" | awk -F'\t' -v n="$req" '$1==n {print; exit}')
              if [[ -z "$match" ]]; then
                echo "Missing check run: $req"
                missing=1
                continue
              fi

              status=$(printf '%s' "$match" | awk -F'\t' '{print $2}')
              conclusion=$(printf '%s' "$match" | awk -F'\t' '{print $3}')
              echo "Check '$req' status=${status} conclusion=${conclusion}"

              if [[ "$status" != "completed" ]]; then
                pending=1
                continue
              fi

              if [[ "$conclusion" != "success" ]]; then
                failed=1
                continue
              fi
            done <<< "$REQUIRED_CHECKS"

            if [[ "$failed" -eq 1 ]]; then
              echo "At least one required check failed."
              exit 1
            fi

            if [[ "$missing" -eq 0 && "$pending" -eq 0 ]]; then
              echo "All required checks succeeded."
              exit 0
            fi

            sleep "$sleep_seconds"
          done

          echo "Timed out waiting for required checks."
          exit 1

      - name: Merge PR
        if: steps.promotion.outputs.proceed == 'true' && steps.update_branch.outputs.update_result != 'failed'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --squash --delete-branch
