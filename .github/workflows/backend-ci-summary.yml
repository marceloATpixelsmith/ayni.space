name: backend-ci-summary

on:
  pull_request:
    branches:
      - master

permissions:
  checks: read
  contents: read
  statuses: read
  pull-requests: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Summarize backend checks for PR SHA
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = context.payload.pull_request?.head?.sha;
            if (!targetSha) {
              core.setFailed("Missing pull_request.head.sha; cannot summarize PR checks.");
              return;
            }

            const requiredChecks = [
              "backend-typecheck",
              "backend-build-api",
              "backend-api-tests",
              "api-regression-suite",
              "auth-security-regression-suite",
            ];

            const requiredSet = new Set(requiredChecks);
            const timeoutMs = 15 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const started = Date.now();

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function collectResults() {
              const checkRuns = await github.paginate(github.rest.checks.listForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: targetSha,
                per_page: 100,
              });

              const statuses = await github.paginate(github.rest.repos.listCommitStatusesForRef, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: targetSha,
                per_page: 100,
              });

              const byName = new Map();

              for (const run of checkRuns) {
                if (!requiredSet.has(run.name)) {
                  continue;
                }

                const existing = byName.get(run.name);
                const candidate = {
                  state: run.status === "completed" ? (run.conclusion ?? "completed") : run.status,
                  status: run.status,
                  isCompleted: run.status === "completed",
                  completedAt: run.completed_at ?? "",
                  updatedAt: run.updated_at ?? "",
                };

                const candidateStamp = `${candidate.completedAt}|${candidate.updatedAt}`;
                const existingStamp = existing ? `${existing.completedAt}|${existing.updatedAt}` : "";
                if (!existing || candidateStamp > existingStamp) {
                  byName.set(run.name, candidate);
                }
              }

              for (const status of statuses) {
                if (!requiredSet.has(status.context)) {
                  continue;
                }
                if (byName.has(status.context)) {
                  continue;
                }

                byName.set(status.context, {
                  state: status.state,
                  status: status.state === "pending" ? "in_progress" : "completed",
                  isCompleted: status.state !== "pending",
                  completedAt: status.state !== "pending" ? (status.updated_at ?? "") : "",
                  updatedAt: status.updated_at ?? "",
                });
              }

              return byName;
            }

            let finalResults = new Map();
            while (Date.now() - started < timeoutMs) {
              finalResults = await collectResults();

              const allPresent = requiredChecks.every((name) => finalResults.has(name));
              const allCompleted = requiredChecks.every((name) => finalResults.get(name)?.isCompleted);
              if (allPresent && allCompleted) {
                break;
              }

              await sleep(intervalMs);
            }

            const passingStates = new Set(["success", "neutral"]);
            const explicitFailStates = new Set([
              "failure",
              "cancelled",
              "action_required",
              "stale",
              "startup_failure",
              "timed_out",
              "error",
            ]);

            const failed = [];
            const missingOrTimedOut = [];
            const incomplete = [];
            const passed = [];

            for (const check of requiredChecks) {
              const result = finalResults.get(check);

              if (!result) {
                missingOrTimedOut.push({ name: check, state: "missing" });
                continue;
              }

              if (!result.isCompleted) {
                incomplete.push({ name: check, state: result.state || result.status || "in_progress" });
                continue;
              }

              if (result.state === "skipped" && result.status === "completed") {
                passed.push({ name: check, state: "skipped" });
                continue;
              }

              if (passingStates.has(result.state)) {
                passed.push({ name: check, state: result.state });
                continue;
              }

              if (explicitFailStates.has(result.state)) {
                failed.push({ name: check, state: result.state });
                continue;
              }

              failed.push({ name: check, state: result.state || "unknown" });
            }

            const overall =
              failed.length > 0 || missingOrTimedOut.length > 0 || incomplete.length > 0
                ? "FAIL"
                : "PASS";

            const renderGroup = (items) =>
              items.length > 0 ? items.map((item) => `- ${item.name} (${item.state})`) : ["- none"];

            const summary = [
              "==================================================",
              "BACKEND CI FAILURE SUMMARY",
              "==================================================",
              "",
              "TARGET SHA:",
              targetSha,
              "",
              `OVERALL RESULT: ${overall}`,
              "",
              "FAILED CHECKS:",
              ...renderGroup(failed),
              "",
              "MISSING OR TIMED OUT CHECKS:",
              ...renderGroup(missingOrTimedOut),
              "",
              "INCOMPLETE CHECKS:",
              ...renderGroup(incomplete),
              "",
              "PASSED CHECKS:",
              ...renderGroup(passed),
              "",
              "NEXT DEBUG STEP:",
              "- If backend-api-tests failed: open backend-api-tests in the PR checks list",
              "- If api-regression-suite failed: open api-regression-suite in the PR checks list",
              "- If auth-security-regression-suite failed: open auth-security-regression-suite in the PR checks list",
              "- If a check is missing or incomplete: re-run or inspect GitHub Actions timing/trigger behavior",
              "",
              "==================================================",
            ].join("\n");

            core.info(summary);
            await core.summary.addCodeBlock(summary).write();

            if (overall === "FAIL") {
              core.setFailed(
                "One or more required backend checks failed, were missing/timed out, or remained incomplete."
              );
            }
