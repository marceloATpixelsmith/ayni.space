name: Backend CI Summary

on:
  workflow_run:
    workflows:
      - Backend Regression Gates
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Collect backend workflow run metadata
        id: run-metadata
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const expectedJobs = [
              'backend-typecheck',
              'backend-build-api',
              'backend-api-tests',
            ];

            const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const conclusionFor = new Map();
            for (const job of jobsResp.data.jobs) {
              if (expectedJobs.includes(job.name)) {
                conclusionFor.set(job.name, job.conclusion || 'unknown');
              }
            }

            for (const jobName of expectedJobs) {
              if (!conclusionFor.has(jobName)) {
                conclusionFor.set(jobName, 'missing');
              }
            }

            const failed = expectedJobs.filter((name) => conclusionFor.get(name) !== 'success');
            const passed = expectedJobs.filter((name) => conclusionFor.get(name) === 'success');
            const overall = failed.length === 0 ? 'PASS' : 'FAIL';

            core.setOutput('run_id', String(run.id));
            core.setOutput('overall', overall);
            core.setOutput('failed', JSON.stringify(failed));
            core.setOutput('passed', JSON.stringify(passed));
            core.setOutput('conclusions', JSON.stringify(Object.fromEntries(conclusionFor)));

      - name: Download backend-typecheck failure artifact
        if: contains(fromJson(steps.run-metadata.outputs.failed), 'backend-typecheck')
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-typecheck-failure-log
          run-id: ${{ steps.run-metadata.outputs.run_id }}
          github-token: ${{ github.token }}
          path: ci-output/backend-typecheck

      - name: Download backend-build-api failure artifact
        if: contains(fromJson(steps.run-metadata.outputs.failed), 'backend-build-api')
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-build-api-failure-log
          run-id: ${{ steps.run-metadata.outputs.run_id }}
          github-token: ${{ github.token }}
          path: ci-output/backend-build-api

      - name: Download backend-api-tests failure artifact
        if: contains(fromJson(steps.run-metadata.outputs.failed), 'backend-api-tests')
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-api-tests-failure-log
          run-id: ${{ steps.run-metadata.outputs.run_id }}
          github-token: ${{ github.token }}
          path: ci-output/backend-api-tests

      - name: Print backend CI summary
        env:
          OVERALL: ${{ steps.run-metadata.outputs.overall }}
          FAILED_JSON: ${{ steps.run-metadata.outputs.failed }}
          PASSED_JSON: ${{ steps.run-metadata.outputs.passed }}
        run: |
          set -euo pipefail

          format_jobs() {
            local json="$1"
            python - <<'PY' "$json"
import json
import sys
jobs = json.loads(sys.argv[1])
if not jobs:
    print("- none")
else:
    for job in jobs:
        print(f"- {job}")
PY
          }

          log_for_job() {
            local job="$1"
            local candidate="ci-output/${job}/${job}.log"
            if [ -f "$candidate" ]; then
              printf '%s' "$candidate"
              return
            fi

            local found
            found="$(find ci-output -type f -name "${job}.log" | head -n 1 || true)"
            if [ -n "$found" ] && [ -f "$found" ]; then
              printf '%s' "$found"
              return
            fi

            printf ''
          }

          print_detail() {
            local job="$1"
            local log_path
            log_path="$(log_for_job "$job")"

            if [ -z "$log_path" ]; then
              echo "no failure log"
              return
            fi

            if [ "$job" = "backend-api-tests" ]; then
              if grep -q "✖ failing tests:" "$log_path"; then
                awk '
                  /✖ failing tests:/{flag=1}
                  flag {
                    if (/^[[:space:]]*[0-9]+ pass/ || /^[[:space:]]*[0-9]+ fail/ || /^Done in / || /^Exit code:/) exit
                    print
                  }
                ' "$log_path" | grep -E "✖ failing tests:|AssertionError|Expected:|Received:|Difference:|at .*test|^- .*|^[[:space:]]+[-+].*" | head -n 120
              else
                tail -n 40 "$log_path"
              fi
              echo "Full raw log: see backend-api-tests-failure-log artifact"
              return
            fi

            grep -E "Failing command:|Error:|ERROR|AssertionError|failed|Exit code:" "$log_path" | tail -n 20 || tail -n 20 "$log_path"
          }

          {
            echo "=================================================="
            echo "BACKEND CI FAILURE SUMMARY"
            echo "=================================================="
            echo
            echo "OVERALL RESULT: ${OVERALL}"
            echo
            echo "FAILED JOBS:"
            format_jobs "$FAILED_JSON"
            echo
            echo "PASSED JOBS:"
            format_jobs "$PASSED_JSON"
            echo
            echo "DETAILS:"
            echo
            echo "[backend-typecheck]"
            print_detail "backend-typecheck"
            echo
            echo "[backend-build-api]"
            print_detail "backend-build-api"
            echo
            echo "[backend-api-tests]"
            print_detail "backend-api-tests"
            echo
            echo "=================================================="
          } | tee backend-ci-failure-summary.txt

          {
            echo '```text'
            cat backend-ci-failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$OVERALL" = "FAIL" ]; then
            exit 1
          fi
