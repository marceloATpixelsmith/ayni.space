name: backend-ci-summary

on:
  pull_request:
    branches:
      - master

concurrency:
  group: backend-ci-summary-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Summarize backend workflow checks for SHA
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = context.payload.pull_request?.head?.sha ?? "";
            if (!targetSha) {
              core.setFailed("Missing github.event.pull_request.head.sha.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAttempts = 4;
            const retryDelayMs = 5000;

            const requiredChecks = [
              "backend-typecheck",
              "backend-build-api",
              "backend-api-tests",
              "api-regression-suite",
              "auth-security-regression-suite",
            ];

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const failedConclusions = new Set([
              "failure",
              "timed_out",
              "cancelled",
              "action_required",
              "startup_failure",
              "stale",
            ]);
            const failedStatuses = new Set(["error", "failure"]);

            async function fetchCheckData() {
              const [checksResponse, statusesResponse] = await Promise.all([
                github.rest.checks.listForRef({
                  owner,
                  repo,
                  ref: targetSha,
                  per_page: 100,
                }),
                github.rest.repos.listCommitStatusesForRef({
                  owner,
                  repo,
                  ref: targetSha,
                  per_page: 100,
                }),
              ]);

              return {
                checkRuns: checksResponse.data.check_runs ?? [],
                statuses: statusesResponse.data ?? [],
              };
            }

            let latest = { checkRuns: [], statuses: [] };
            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              latest = await fetchCheckData();
              const visible = requiredChecks.filter((checkName) => {
                const hasCheckRun = latest.checkRuns.some((run) => run.name === checkName);
                const hasStatus = latest.statuses.some((status) => status.context === checkName);
                return hasCheckRun || hasStatus;
              }).length;

              if (visible > 0 || attempt === maxAttempts) {
                break;
              }

              await sleep(retryDelayMs);
            }

            const checkResults = requiredChecks.map((checkName) => {
              const checkRun = latest.checkRuns.find((run) => run.name === checkName);
              const statusCheck = latest.statuses.find((status) => status.context === checkName);

              if (checkRun) {
                const state = checkRun.conclusion || checkRun.status || "unknown";
                const passed = checkRun.conclusion === "success";
                const failed =
                  checkRun.status === "completed" &&
                  !!checkRun.conclusion &&
                  failedConclusions.has(checkRun.conclusion);

                return {
                  name: checkName,
                  passed,
                  failed,
                  state,
                  url: checkRun.html_url || "n/a",
                };
              }

              if (statusCheck) {
                const state = statusCheck.state || "unknown";
                const passed = state === "success";
                const failed = failedStatuses.has(state);

                return {
                  name: checkName,
                  passed,
                  failed,
                  state,
                  url: statusCheck.target_url || "n/a",
                };
              }

              return {
                name: checkName,
                passed: false,
                failed: false,
                state: "not_visible_yet",
                url: "n/a",
              };
            });

            const failedChecks = checkResults.filter((item) => item.failed);
            const passedChecks = checkResults.filter((item) => item.passed);
            const pendingChecks = checkResults.filter((item) => !item.passed && !item.failed);
            const overall = failedChecks.length > 0 ? "FAIL" : "PASS";
            const renderLink = (label, url) => `- ${label}: ${url || "n/a"}`;

            const summary = [
              "# BACKEND CI SUMMARY",
              "",
              "## TARGET SHA",
              `\`${targetSha}\``,
              "",
              `## OVERALL RESULT: ${overall}`,
              "",
              "## FAILED CHECKS",
              ...(failedChecks.length > 0
                ? failedChecks.map((item) => `- ${item.name} (${item.state})`)
                : ["- none"]),
              "",
              "## PASSED CHECKS",
              ...(passedChecks.length > 0
                ? passedChecks.map((item) => `- ${item.name} (${item.state})`)
                : ["- none"]),
              "",
              "## CHECK LINKS",
              ...checkResults.map((item) => renderLink(item.name, item.url)),
              "",
              "## NEXT DEBUG STEP",
              failedChecks.length > 0
                ? "- Open the failed check links and inspect failing logs first."
                : pendingChecks.length > 0
                  ? `- Some checks are not visible or still running (${pendingChecks.map((item) => item.name).join(", ")}); refresh this summary after they complete.`
                  : "- No action needed.",
            ].join("\n");

            core.info(summary);
            await core.summary.addRaw(summary).write();

            if (failedChecks.length > 0) {
              core.setFailed("One or more required backend checks failed.");
            }
