name: backend-ci-summary

on:
  pull_request:
    branches:
      - master

permissions:
  checks: read
  contents: read
  statuses: read
  pull-requests: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Summarize backend checks for PR SHA
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = context.payload.pull_request?.head?.sha;
            if (!targetSha) {
              core.setFailed("Missing pull_request.head.sha; cannot summarize PR checks.");
              return;
            }

            const requiredChecks = [
              "backend-typecheck",
              "backend-build-api",
              "backend-api-tests",
              "api-regression-suite",
              "auth-security-regression-suite",
            ];

            const requiredSet = new Set(requiredChecks);
            const timeoutMs = 15 * 60 * 1000;
            const intervalMs = 15 * 1000;
            const started = Date.now();

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function collectResults() {
              const commitChecksUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`;
              const checkRuns = await github.paginate(
                github.rest.checks.listForRef,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: targetSha,
                  per_page: 100,
                },
                (response) => response.data.check_runs
              );

              const statuses = await github.paginate(
                github.rest.repos.listCommitStatusesForRef,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: targetSha,
                  per_page: 100,
                },
                (response) => response.data
              );

              const byName = new Map();

              for (const run of checkRuns) {
                if (!requiredSet.has(run.name)) {
                  continue;
                }

                const existing = byName.get(run.name);
                const candidate = {
                  name: run.name,
                  state: run.status === "completed" ? (run.conclusion ?? "completed") : run.status,
                  status: run.status,
                  isCompleted: run.status === "completed",
                  completedAt: run.completed_at ?? "",
                  updatedAt: run.updated_at ?? "",
                  url: run.html_url || commitChecksUrl,
                };

                const candidateStamp = `${candidate.completedAt}|${candidate.updatedAt}`;
                const existingStamp = existing ? `${existing.completedAt}|${existing.updatedAt}` : "";
                if (!existing || candidateStamp > existingStamp) {
                  byName.set(run.name, candidate);
                }
              }

              for (const status of statuses) {
                if (!requiredSet.has(status.context)) {
                  continue;
                }
                if (byName.has(status.context)) {
                  continue;
                }

                byName.set(status.context, {
                  name: status.context,
                  state: status.state,
                  status: status.state === "pending" ? "in_progress" : "completed",
                  isCompleted: status.state !== "pending",
                  completedAt: status.state !== "pending" ? (status.updated_at ?? "") : "",
                  updatedAt: status.updated_at ?? "",
                  url: status.target_url || commitChecksUrl,
                });
              }

              return byName;
            }

            let finalResults = new Map();
            while (Date.now() - started < timeoutMs) {
              finalResults = await collectResults();

              const allPresent = requiredChecks.every((name) => finalResults.has(name));
              const allCompleted = requiredChecks.every((name) => finalResults.get(name)?.isCompleted);
              if (allPresent && allCompleted) {
                break;
              }

              await sleep(intervalMs);
            }

            const passingStates = new Set(["success", "neutral"]);
            const explicitFailStates = new Set([
              "failure",
              "cancelled",
              "action_required",
              "stale",
              "startup_failure",
              "timed_out",
              "error",
            ]);

            const failed = [];
            const missingOrTimedOut = [];
            const incomplete = [];
            const passed = [];

            for (const check of requiredChecks) {
              const result = finalResults.get(check);

              if (!result) {
                missingOrTimedOut.push({
                  name: check,
                  state: "missing",
                  url: `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
                });
                continue;
              }

              if (!result.isCompleted) {
                incomplete.push({
                  name: check,
                  state: result.state || result.status || "in_progress",
                  url: result.url || `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
                });
                continue;
              }

              if (result.state === "skipped" && result.status === "completed") {
                passed.push({
                  name: check,
                  state: "skipped",
                  url: result.url || `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
                });
                continue;
              }

              if (passingStates.has(result.state)) {
                passed.push({
                  name: check,
                  state: result.state,
                  url: result.url || `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
                });
                continue;
              }

              if (explicitFailStates.has(result.state)) {
                failed.push({
                  name: check,
                  state: result.state,
                  url: result.url || `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
                });
                continue;
              }

              failed.push({
                name: check,
                state: result.state || "unknown",
                url: result.url || `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`,
              });
            }

            const overall =
              failed.length > 0 || missingOrTimedOut.length > 0 || incomplete.length > 0
                ? "FAIL"
                : "PASS";

            const renderGroup = (items) =>
              items.length > 0
                ? items.map((item) => `- ${item.name} (${item.state}) → ${item.url}`)
                : ["- none"];

            const checkLinks = requiredChecks.map((checkName) => {
              const result = finalResults.get(checkName);
              const fallbackUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${targetSha}/checks`;
              return `- ${checkName} → ${result?.url || fallbackUrl}`;
            });

            let nextDebugStep = "All required checks completed successfully.";
            if (failed.length > 0) {
              nextDebugStep = "Investigate failed checks first using links above.";
            } else if (missingOrTimedOut.length > 0) {
              nextDebugStep = "These checks never reported for this SHA. Verify workflow triggers and job names.";
            } else if (incomplete.length > 0) {
              nextDebugStep = "These checks are still running or stuck. Wait or inspect their logs.";
            }

            const summary = [
              "# BACKEND CI FAILURE SUMMARY",
              "",
              "## TARGET SHA",
              `\`${targetSha}\``,
              "",
              `## OVERALL RESULT: ${overall}`,
              "",
              "## FAILED CHECKS",
              ...renderGroup(failed),
              "",
              "## MISSING OR TIMED OUT CHECKS",
              ...renderGroup(missingOrTimedOut),
              "",
              "## INCOMPLETE CHECKS",
              ...renderGroup(incomplete),
              "",
              "## PASSED CHECKS",
              ...renderGroup(passed),
              "",
              "## CHECK LINKS",
              ...checkLinks,
              "",
              "## NEXT DEBUG STEP",
              `- ${nextDebugStep}`,
            ].join("\n");

            core.info(summary);
            await core.summary.addRaw(summary).write();

            if (overall === "FAIL") {
              core.setFailed(
                "One or more required backend checks failed, were missing/timed out, or remained incomplete."
              );
            }
