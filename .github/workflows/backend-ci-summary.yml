name: backend-ci-summary

on:
  workflow_run:
    workflows:
      - Backend Regression Gates
      - API Regression Suite
      - Auth Security Regression Suite
    types:
      - completed

concurrency:
  group: backend-ci-summary-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Summarize backend workflow checks for SHA
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = context.payload.workflow_run?.head_sha ?? "";
            if (!targetSha) {
              core.setFailed("Missing github.event.workflow_run.head_sha.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const maxAttempts = 3;
            const retryDelayMs = 5000;

            const workflowNames = {
              backend: "Backend Regression Gates",
              api: "API Regression Suite",
              auth: "Auth Security Regression Suite",
            };

            const requiredBackendJobs = [
              "backend-typecheck",
              "backend-build-api",
              "backend-api-tests",
            ];

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function retryApi(fn) {
              let lastError;
              for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
                try {
                  return await fn();
                } catch (error) {
                  lastError = error;
                  if (attempt < maxAttempts) {
                    await sleep(retryDelayMs);
                  }
                }
              }
              throw lastError;
            }

            async function fetchWorkflowRuns() {
              const runs = await retryApi(async () => {
                const response = await github.rest.actions.listWorkflowRunsForRepo({
                  owner,
                  repo,
                  head_sha: targetSha,
                  per_page: 100,
                });
                return response.data.workflow_runs ?? [];
              });

              const byWorkflowName = new Map();
              for (const run of runs) {
                if (!run?.name || !Object.values(workflowNames).includes(run.name)) {
                  continue;
                }
                const existing = byWorkflowName.get(run.name);
                if (!existing || (run.run_number ?? 0) > (existing.run_number ?? 0)) {
                  byWorkflowName.set(run.name, run);
                }
              }
              return byWorkflowName;
            }

            const runsByName = await fetchWorkflowRuns();

            const backendRun = runsByName.get(workflowNames.backend);
            const apiRun = runsByName.get(workflowNames.api);
            const authRun = runsByName.get(workflowNames.auth);

            const missingOrIncomplete = [];
            for (const [label, run] of [
              [workflowNames.backend, backendRun],
              [workflowNames.api, apiRun],
              [workflowNames.auth, authRun],
            ]) {
              if (!run) {
                missingOrIncomplete.push(`${label} (missing)`);
              } else if (run.status !== "completed") {
                missingOrIncomplete.push(`${label} (${run.status || "unknown"})`);
              }
            }

            const renderLink = (label, url) => `- ${label}: ${url || "n/a"}`;

            if (missingOrIncomplete.length > 0) {
              const waitingSummary = [
                "# BACKEND CI SUMMARY",
                "",
                "## TARGET SHA",
                `\`${targetSha}\``,
                "",
                "## OVERALL RESULT: WAITING",
                "",
                "## WAITING ON",
                ...missingOrIncomplete.map((item) => `- ${item}`),
                "",
                "## CHECK LINKS",
                renderLink(workflowNames.backend, backendRun?.html_url),
                renderLink(workflowNames.api, apiRun?.html_url),
                renderLink(workflowNames.auth, authRun?.html_url),
                "",
                "## NEXT DEBUG STEP",
                "- Wait for remaining source workflows for this SHA to complete.",
              ].join("\n");

              core.info(waitingSummary);
              await core.summary.addRaw(waitingSummary).write();
              return;
            }

            const backendJobsResponse = await retryApi(async () => {
              return github.rest.actions.listJobsForWorkflowRun({
                owner,
                repo,
                run_id: backendRun.id,
                per_page: 100,
              });
            });
            const backendJobs = backendJobsResponse.data.jobs ?? [];

            const backendJobByName = new Map();
            for (const job of backendJobs) {
              if (requiredBackendJobs.includes(job.name)) {
                backendJobByName.set(job.name, job);
              }
            }

            const checkResults = [];

            for (const jobName of requiredBackendJobs) {
              const job = backendJobByName.get(jobName);
              const passed = job?.conclusion === "success";
              checkResults.push({
                name: jobName,
                passed,
                state: job?.conclusion || "missing",
                url: job?.html_url || backendRun.html_url,
              });
            }

            checkResults.push({
              name: "api-regression-suite",
              passed: apiRun.conclusion === "success",
              state: apiRun.conclusion || "missing",
              url: apiRun.html_url,
            });

            checkResults.push({
              name: "auth-security-regression-suite",
              passed: authRun.conclusion === "success",
              state: authRun.conclusion || "missing",
              url: authRun.html_url,
            });

            const failedChecks = checkResults.filter((item) => !item.passed);
            const passedChecks = checkResults.filter((item) => item.passed);
            const overall = failedChecks.length > 0 ? "FAIL" : "PASS";

            const summary = [
              "# BACKEND CI SUMMARY",
              "",
              "## TARGET SHA",
              `\`${targetSha}\``,
              "",
              `## OVERALL RESULT: ${overall}`,
              "",
              "## FAILED CHECKS",
              ...(failedChecks.length > 0
                ? failedChecks.map((item) => `- ${item.name} (${item.state})`)
                : ["- none"]),
              "",
              "## PASSED CHECKS",
              ...(passedChecks.length > 0
                ? passedChecks.map((item) => `- ${item.name} (${item.state})`)
                : ["- none"]),
              "",
              "## CHECK LINKS",
              ...checkResults.map((item) => renderLink(item.name, item.url)),
              "",
              "## NEXT DEBUG STEP",
              failedChecks.length > 0
                ? "- Open the failed check links and inspect failing logs first."
                : "- No action needed.",
            ].join("\n");

            core.info(summary);
            await core.summary.addRaw(summary).write();

            if (failedChecks.length > 0) {
              core.setFailed("One or more required backend checks failed.");
            }
