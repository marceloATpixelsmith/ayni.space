name: Backend CI Summary

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Build backend CI cross-workflow summary
        id: build-summary
        uses: actions/github-script@v7
        with:
          script: |
            const trackedWorkflowNames = [
              'Backend Regression Gates',
              'API Regression Suite',
              'Auth Security Regression Suite',
            ];

            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const relevantRuns = runs.data.workflow_runs.filter(
              (run) => run.head_sha === context.sha
            );

            const latestByName = new Map();
            for (const workflowName of trackedWorkflowNames) {
              const workflowRuns = relevantRuns.filter((run) => run.name === workflowName);
              if (workflowRuns.length > 0) {
                latestByName.set(workflowName, {
                  name: workflowRuns[0].name,
                  conclusion: workflowRuns[0].conclusion ?? 'cancelled',
                });
              }
            }

            const failedChecks = [];
            const passedChecks = [];

            for (const workflowName of trackedWorkflowNames) {
              const record = latestByName.get(workflowName);
              if (!record) {
                continue;
              }

              if (record.conclusion === 'success') {
                passedChecks.push(record.name);
              } else {
                failedChecks.push(record.name);
              }
            }

            const overallResult = failedChecks.length === 0 ? 'PASS' : 'FAIL';
            const failedBlock = failedChecks.length > 0 ? failedChecks.map((name) => `- ${name}`).join('\n') : '- none';
            const passedBlock = passedChecks.length > 0 ? passedChecks.map((name) => `- ${name}`).join('\n') : '- none';

            const summary = [
              '==================================================',
              'BACKEND CI FAILURE SUMMARY',
              '==================================================',
              '',
              `OVERALL RESULT: ${overallResult}`,
              '',
              'FAILED CHECKS:',
              failedBlock,
              '',
              'PASSED CHECKS:',
              passedBlock,
              '',
              '==================================================',
            ].join('\n');

            core.setOutput('summary', summary);

      - name: Print summary to console and step summary
        run: |
          echo "${{ steps.build-summary.outputs.summary }}"
          {
            echo "${{ steps.build-summary.outputs.summary }}"
          } >> "$GITHUB_STEP_SUMMARY"
