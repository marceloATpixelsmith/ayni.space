name: Backend CI Summary

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    steps:
      - name: Build backend CI cross-workflow summary
        id: build-summary
        uses: actions/github-script@v7
        with:
          script: |
            const trackedCheckNames = [
              'Backend Regression Gates',
              'API Regression Suite',
              'Auth Security Regression Suite',
            ];

            const matched = [];
            let page = 1;

            while (true) {
              const response = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                per_page: 100,
                page,
              });

              const runs = response.data.check_runs ?? [];
              for (const run of runs) {
                if (!trackedCheckNames.includes(run.name)) {
                  continue;
                }

                const conclusion = run.conclusion ?? 'cancelled';
                if (!['success', 'failure', 'cancelled'].includes(conclusion)) {
                  continue;
                }

                matched.push({
                  name: run.name,
                  conclusion,
                });
              }

              if (runs.length < 100) {
                break;
              }

              page += 1;
            }

            const latestByName = new Map();
            for (const checkName of trackedCheckNames) {
              const records = matched.filter((entry) => entry.name === checkName);
              if (records.length > 0) {
                latestByName.set(checkName, records[0]);
              }
            }

            const failedChecks = [];
            const passedChecks = [];

            for (const checkName of trackedCheckNames) {
              const record = latestByName.get(checkName);
              if (!record) {
                continue;
              }

              if (record.conclusion === 'success') {
                passedChecks.push(record.name);
              } else {
                failedChecks.push(record.name);
              }
            }

            const overallResult = failedChecks.length === 0 ? 'PASS' : 'FAIL';
            const failedBlock = failedChecks.length > 0 ? failedChecks.map((name) => `- ${name}`).join('\n') : '- none';
            const passedBlock = passedChecks.length > 0 ? passedChecks.map((name) => `- ${name}`).join('\n') : '- none';

            const summary = [
              '==================================================',
              'BACKEND CI FAILURE SUMMARY',
              '==================================================',
              '',
              `OVERALL RESULT: ${overallResult}`,
              '',
              'FAILED CHECKS:',
              failedBlock,
              '',
              'PASSED CHECKS:',
              passedBlock,
              '',
              '==================================================',
            ].join('\n');

            core.setOutput('summary', summary);

      - name: Print summary to console and step summary
        run: |
          echo "${{ steps.build-summary.outputs.summary }}"
          {
            echo "${{ steps.build-summary.outputs.summary }}"
          } >> "$GITHUB_STEP_SUMMARY"
