name: Auto Merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.base_ref == 'master' && startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge (REBASE)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --rebase \
            --auto
