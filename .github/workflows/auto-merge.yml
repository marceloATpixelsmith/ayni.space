name: Auto Merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - ".github/workflows/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.base_ref == 'master' && startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          set +e
          output=$(gh pr merge ${{ github.event.pull_request.number }} --rebase --auto 2>&1)
          status=$?
          set -e

          echo "$output"

          if [ $status -ne 0 ]; then
            if echo "$output" | grep -qi "can't be rebased"; then
              echo "::warning::Auto-merge skipped because branch cannot be rebased automatically yet."
              exit 0
            fi
            exit $status
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
