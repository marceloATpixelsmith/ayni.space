name: PR Checks Summary Aggregator

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  actions: read
  checks: read
  contents: read

concurrency:
  group: pr-checks-summary-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  pr-checks-summary:
    name: pr-checks-summary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate summary CLI wiring
        run: |
          set -euo pipefail

          summary_cli_path="scripts/ci/pr-checks-summary-targeting-cli.mjs"
          summary_module_path="scripts/ci/pr-checks-summary-targeting.mjs"

          echo "Resolved summary CLI path: $(realpath "$summary_cli_path")"
          echo "Resolved summary module path: $(realpath "$summary_module_path")"

          for required_file in "$summary_cli_path" "$summary_module_path"; do
            if [ ! -f "$required_file" ]; then
              echo "Required summary script is missing: $required_file" >&2
              exit 1
            fi
          done

          node --check "$summary_cli_path"
          node --check "$summary_module_path"

      - name: Build consolidated check summary block
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          SUMMARY_CHECK_NAME: pr-checks-summary
          TARGET_CHECK_ALLOWLIST: |
            backend-gates
            auth-security-regression-suite
            test
            Verify pnpm lockfile is up to date
            check
        run: |
          set -euo pipefail

          mkdir -p artifacts/pr-checks-summary

          target_checks_file="artifacts/pr-checks-summary/target-checks.txt"
          tracked_checks_file="artifacts/pr-checks-summary/tracked-checks.txt"
          printf '%s\n' "$TARGET_CHECK_ALLOWLIST" | sed '/^\s*$/d' > "$target_checks_file"

          fetch_checks() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100"
          }

          echo "Discovering tracked checks for ${HEAD_SHA}..."
          fetch_checks > artifacts/pr-checks-summary/check-runs.discovery.json
          node scripts/ci/pr-checks-summary-targeting-cli.mjs \
            --input artifacts/pr-checks-summary/check-runs.discovery.json \
            --allowlistFile "$target_checks_file" \
            --summaryCheck "$SUMMARY_CHECK_NAME" \
            --headSha "$HEAD_SHA" \
            --trackedFile "$target_checks_file" \
            > artifacts/pr-checks-summary/discovery-state.json

          jq -r '.tracked[].name' artifacts/pr-checks-summary/discovery-state.json > "$tracked_checks_file"

          echo "TRACKING CHECKS:"
          if [ -s "$tracked_checks_file" ]; then
            sed 's/^/- /' "$tracked_checks_file"
          else
            echo "- none (no allowlisted top-level checks discovered for this commit)"
          fi

          attempts=0
          max_attempts=90
          sleep_seconds=20

          while true; do
            attempts=$((attempts + 1))
            fetch_checks > artifacts/pr-checks-summary/check-runs.json

            node scripts/ci/pr-checks-summary-targeting-cli.mjs \
              --input artifacts/pr-checks-summary/check-runs.json \
              --allowlistFile "$target_checks_file" \
              --summaryCheck "$SUMMARY_CHECK_NAME" \
              --headSha "$HEAD_SHA" \
              --trackedFile "$tracked_checks_file" \
              > artifacts/pr-checks-summary/poll-state.json

            if jq -e '.complete' artifacts/pr-checks-summary/poll-state.json >/dev/null; then
              echo "All tracked checks are completed."
              break
            fi

            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "Timed out waiting for tracked checks to complete; continuing with best-effort aggregation."
              break
            fi

            echo "Attempt ${attempts}/${max_attempts}: waiting on tracked checks:"
            jq -r '.pending[] | "- \(.name): status=\(.status), conclusion=\(.conclusion)"' artifacts/pr-checks-summary/poll-state.json
            sleep "$sleep_seconds"
          done

          cp artifacts/pr-checks-summary/check-runs.json artifacts/pr-checks-summary/check-runs.final.json

          summary_file="artifacts/pr-checks-summary/consolidated-summary.txt"
          run_cache_dir="artifacts/pr-checks-summary/run-logs"
          mkdir -p "$run_cache_dir"

          {
            echo "PR CHECK FAILURE SUMMARY (commit ${HEAD_SHA})"
            echo
          } > "$summary_file"

          failures=0
          unfinished=0
          passes=0
          summary_timed_out=0

          if [ "$attempts" -ge "$max_attempts" ]; then
            summary_timed_out=1
          fi

          extract_run_and_job_ids() {
            local details_url="$1"
            local run_id
            local job_id

            run_id=$(echo "$details_url" | sed -n 's#.*\/runs\/\([0-9]\+\)\/job\/\([0-9]\+\).*#\1#p')
            job_id=$(echo "$details_url" | sed -n 's#.*\/runs\/\([0-9]\+\)\/job\/\([0-9]\+\).*#\2#p')

            if [ -n "$run_id" ] && [ -n "$job_id" ]; then
              echo "$run_id $job_id"
            fi
          }

          ensure_run_logs_downloaded() {
            local run_id="$1"
            local run_dir="${run_cache_dir}/${run_id}"
            local zip_path="${run_dir}/logs.zip"

            if [ -d "$run_dir/extracted" ]; then
              return 0
            fi

            mkdir -p "$run_dir/extracted"
            if gh api -H "Accept: application/vnd.github+json" "/repos/${REPO}/actions/runs/${run_id}/logs" > "$zip_path"; then
              if ! unzip -o -q "$zip_path" -d "$run_dir/extracted"; then
                return 1
              fi
            else
              return 1
            fi

            return 0
          }

          find_job_log_file() {
            local run_id="$1"
            local job_id="$2"
            local run_dir="${run_cache_dir}/${run_id}/extracted"

            find "$run_dir" -type f -name "*${job_id}*.txt" | head -n 1
          }

          extract_failure_chunk() {
            local log_path="$1"

            if [ ! -f "$log_path" ]; then
              echo "Unable to locate extracted job log file."
              return
            fi

            awk '
              /##\[error\]|\bERROR\b|\bError:\b|\bFAIL\b|AssertionError|Traceback|Exception/ {
                start=NR-30; if (start<1) start=1; end=NR+30
              }
              { lines[NR]=$0 }
              END {
                if (end==0) {
                  s=NR-220; if (s<1) s=1;
                  for (i=s; i<=NR; i++) print lines[i];
                } else {
                  for (i=start; i<=end && i<=NR; i++) print lines[i];
                }
              }
            ' "$log_path"
          }

          node scripts/ci/pr-checks-summary-targeting-cli.mjs \
            --input artifacts/pr-checks-summary/check-runs.final.json \
            --allowlistFile "$target_checks_file" \
            --summaryCheck "$SUMMARY_CHECK_NAME" \
            --headSha "$HEAD_SHA" \
            --trackedFile "$tracked_checks_file" \
            > artifacts/pr-checks-summary/final-state.json

          declare -A check_status_map
          declare -A check_conclusion_map
          declare -A check_html_map
          declare -A check_details_map
          while IFS=$'\t' read -r name status conclusion html_url details_url; do
            check_status_map[$name]="$status"
            check_conclusion_map[$name]="$conclusion"
            check_html_map[$name]="$html_url"
            check_details_map[$name]="$details_url"
          done < <(jq -r '.tracked[] | [.name, .status, .conclusion, .html_url, .details_url] | @tsv' artifacts/pr-checks-summary/final-state.json)

          failed_checks_block=""
          unfinished_checks_block=""
          passed_checks_block=""

          while IFS= read -r check_name; do
            [ -z "$check_name" ] && continue

            status="${check_status_map[$check_name]-}"
            conclusion="${check_conclusion_map[$check_name]-}"
            html_url="${check_html_map[$check_name]-}"
            details_url="${check_details_map[$check_name]-}"

            if [ -z "$status" ]; then
              unfinished=$((unfinished + 1))
              unfinished_checks_block="${unfinished_checks_block}- ${check_name}: unknown / unavailable (targeted check run not found for commit)\n"
              continue
            fi

            if [ "$status" != "completed" ]; then
              unfinished=$((unfinished + 1))
              unfinished_checks_block="${unfinished_checks_block}- ${check_name}: ${status} (not completed before summary timeout)\n"
              continue
            fi

            if [ "$conclusion" = "success" ]; then
              passes=$((passes + 1))
              passed_checks_block="${passed_checks_block}- ${check_name}: success\n"
              continue
            fi

            if [ "$conclusion" = "failure" ] || [ "$conclusion" = "cancelled" ] || [ "$conclusion" = "timed_out" ]; then
              failures=$((failures + 1))

              run_job_ids=$(extract_run_and_job_ids "$details_url" || true)
              run_id=""
              job_id=""
              if [ -n "$run_job_ids" ]; then
                run_id=$(echo "$run_job_ids" | awk '{print $1}')
                job_id=$(echo "$run_job_ids" | awk '{print $2}')
              fi

              error_text=""
              retrieval_note=""

              if [ -n "$run_id" ] && [ -n "$job_id" ] && ensure_run_logs_downloaded "$run_id"; then
                job_log_file=$(find_job_log_file "$run_id" "$job_id" || true)
                if [ -n "$job_log_file" ]; then
                  error_text=$(extract_failure_chunk "$job_log_file")
                else
                  retrieval_note="Could not match job log file by job ID ${job_id}."
                fi
              else
                retrieval_note="Could not download or parse run/job logs from details URL."
              fi

              if [ -z "$error_text" ]; then
                check_output=$(gh api -H "Accept: application/vnd.github+json" "/repos/${REPO}/commits/${HEAD_SHA}/check-runs?per_page=100" | jq -r --arg check_name "$check_name" '.check_runs[] | select(.name == $check_name) | .output.text // .output.summary // ""' | head -n 1)
                error_text="$check_output"
              fi

              if [ -z "$error_text" ]; then
                error_text="No error text available from logs or check output."
              fi

              failed_checks_block="${failed_checks_block}- ${check_name}: ${conclusion} (${html_url})\n"
              failed_checks_block="${failed_checks_block}  ERROR CONTEXT:\n"
              failed_checks_block="${failed_checks_block}$(echo "$error_text" | sed 's/^/  /')\n"
              if [ -n "$retrieval_note" ]; then
                failed_checks_block="${failed_checks_block}  NOTE: ${retrieval_note}\n"
              fi
              continue
            fi

            unfinished=$((unfinished + 1))
            unfinished_checks_block="${unfinished_checks_block}- ${check_name}: ${conclusion} (unknown / unavailable final conclusion)\n"
          done < "$tracked_checks_file"

          overall_result="PASS"
          if [ "$failures" -gt 0 ]; then
            overall_result="FAIL"
          elif [ "$unfinished" -gt 0 ]; then
            overall_result="INCOMPLETE"
          fi

          {
            echo "OVERALL RESULT: ${overall_result}"
            if [ "$overall_result" = "PASS" ]; then
              echo "All relevant checks passed."
            elif [ "$overall_result" = "FAIL" ]; then
              echo "One or more targeted checks failed."
            else
              if [ "$summary_timed_out" -eq 1 ]; then
                echo "Summary is incomplete: at least one targeted check is unfinished or unavailable at timeout."
              else
                echo "Summary is incomplete: at least one targeted check is unfinished or unavailable."
              fi
            fi
            echo
            echo "FAILED CHECKS:"
            if [ -n "$failed_checks_block" ]; then
              printf '%b' "$failed_checks_block"
            else
              echo "- none"
            fi
            echo
            echo "UNFINISHED CHECKS:"
            if [ -n "$unfinished_checks_block" ]; then
              printf '%b' "$unfinished_checks_block"
            else
              echo "- none"
            fi
            echo
            echo "PASSED CHECKS:"
            if [ -n "$passed_checks_block" ]; then
              printf '%b' "$passed_checks_block"
            else
              echo "- none"
            fi
          } >> "$summary_file"

          if [ "$overall_result" != "PASS" ] && grep -Fq "All relevant checks passed." "$summary_file"; then
            echo "Invalid summary state: non-PASS summary included PASS messaging." >&2
            exit 1
          fi

          if [ "$overall_result" = "PASS" ] && { [ "$failures" -gt 0 ] || [ "$unfinished" -gt 0 ]; }; then
            echo "Invalid summary state: PASS requires zero failed and zero unfinished checks." >&2
            exit 1
          fi

          {
            echo '```text'
            cat "$summary_file"
            echo '```'
          } | tee artifacts/pr-checks-summary/consolidated-summary-block.md

          cat artifacts/pr-checks-summary/consolidated-summary-block.md
          cat artifacts/pr-checks-summary/consolidated-summary-block.md >> "$GITHUB_STEP_SUMMARY"
