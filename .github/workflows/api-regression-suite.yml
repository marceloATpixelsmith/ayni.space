name: API Regression Suite

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/db/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-regression-suite.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/db/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/api-regression-suite.yml"
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: read

jobs:
  api-regression:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:api-regression
