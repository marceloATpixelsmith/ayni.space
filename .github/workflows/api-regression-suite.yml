name: API Regression Suite

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  api-regression-suite:
    name: api-regression-suite
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Reset pnpm store before install
        run: |
          STORE_PATH="$(pnpm store path --silent)"
          rm -rf "$STORE_PATH"
          mkdir -p "$STORE_PATH"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run api-regression-suite
        run: |
          mkdir -p ci-output
          LOG_FILE="ci-output/api-regression-suite.log"
          COMMAND="pnpm --filter @workspace/api-server run test:regression:ci"
          {
            echo "Failing command: $COMMAND"
            echo "----------------------------------------"
          } > "$LOG_FILE"
          set +e
          $COMMAND 2>&1 | tee -a "$LOG_FILE"
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "----------------------------------------" >> "$LOG_FILE"
          echo "Exit code: $STATUS" >> "$LOG_FILE"
          if [ "$STATUS" -ne 0 ]; then
            node scripts/ci/extract-failure-summary.mjs "$LOG_FILE" | tee -a "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi
      - name: Upload api-regression-suite failure log
        if: ${{ failure() && hashFiles('ci-output/api-regression-suite.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-suite-failure-log
          path: ci-output/api-regression-suite.log
          if-no-files-found: error
