name: API Regression Suite

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  api-regression-suite:
    name: api-regression-suite
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run api-regression-suite
        run: pnpm --filter @workspace/api-server run test:regression:ci
