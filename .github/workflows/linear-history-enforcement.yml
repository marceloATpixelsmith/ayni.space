name: Enforce Linear History

on:
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          git fetch origin master
          if git log origin/master..HEAD --merges | grep .; then
            echo "Merge commits are not allowed"
            exit 1
          fi
