name: Enforce Linear History

on:
  pull_request:
    branches: [master]

jobs:
  check:
    if: github.head_ref == '' || !startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - run: |
          set -euo pipefail

          git fetch origin "${{ github.event.pull_request.base.ref }}"
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          merge_commits=$(git rev-list --merges "${base_sha}..${head_sha}")

          if [[ -n "$merge_commits" ]]; then
            echo "Merge commits detected in this PR branch."
            echo "$merge_commits"
            echo "Use: git fetch origin ${{ github.event.pull_request.base.ref }} && git rebase origin/${{ github.event.pull_request.base.ref }}"
            if [[ "${{ github.head_ref }}" == codex/* ]]; then
              echo "::warning::Codex branch has merge commits; check marked warning to avoid blocking automation."
              exit 0
            fi
            exit 1
          fi

          echo "No merge commits detected in PR commits."
