name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/**"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/**"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-typecheck.log"
          command=(pnpm -w typecheck)
          {
            echo "Failing command: pnpm -w typecheck"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Typecheck failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck.log
          if-no-files-found: error

  backend-build-api:
    name: backend-build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build API server
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-build-api.log"
          command=(pnpm --filter @workspace/api-server run build)
          {
            echo "Failing command: pnpm --filter @workspace/api-server run build"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Build failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api.log
          if-no-files-found: error

  backend-api-tests:
    name: backend-api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API tests
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-api-tests.log"
          command=(pnpm --filter @workspace/api-server run test:ci)
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:ci"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "API tests failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests.log
          if-no-files-found: error

  backend-api-regression:
    name: backend-api-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API regression tests
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-api-regression.log"
          command=(pnpm --filter @workspace/api-server run test:regression:ci)
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:regression:ci"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "API regression tests failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-regression-failure-log
          path: ci-output/backend-api-regression.log
          if-no-files-found: error

  backend-auth-security-regression:
    name: backend-auth-security-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run auth security regression tests
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-auth-security-regression.log"
          command=(pnpm run test:auth-security-regression)
          {
            echo "Failing command: pnpm run test:auth-security-regression"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Auth security regression tests failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-auth-security-regression-failure-log
          path: ci-output/backend-auth-security-regression.log
          if-no-files-found: error

  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-typecheck
      - backend-build-api
      - backend-api-tests
      - backend-api-regression
      - backend-auth-security-regression
    steps:
      - name: Download backend-typecheck failure artifact
        if: ${{ needs['backend-typecheck'].result != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output

      - name: Download backend-build-api failure artifact
        if: ${{ needs['backend-build-api'].result != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output

      - name: Download backend-api-tests failure artifact
        if: ${{ needs['backend-api-tests'].result != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output

      - name: Download backend-api-regression failure artifact
        if: ${{ needs['backend-api-regression'].result != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-api-regression-failure-log
          path: ci-output

      - name: Download backend-auth-security-regression failure artifact
        if: ${{ needs['backend-auth-security-regression'].result != 'success' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: backend-auth-security-regression-failure-log
          path: ci-output

      - name: Print consolidated backend summary
        run: |
          backend_typecheck_result="${{ needs['backend-typecheck'].result }}"
          backend_build_api_result="${{ needs['backend-build-api'].result }}"
          backend_api_tests_result="${{ needs['backend-api-tests'].result }}"
          backend_api_regression_result="${{ needs['backend-api-regression'].result }}"
          backend_auth_security_regression_result="${{ needs['backend-auth-security-regression'].result }}"

          failed_jobs=()
          passed_jobs=()

          collect_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              passed_jobs+=("$job_name")
            else
              failed_jobs+=("$job_name")
            fi
          }

          collect_result "backend-typecheck" "$backend_typecheck_result"
          collect_result "backend-build-api" "$backend_build_api_result"
          collect_result "backend-api-tests" "$backend_api_tests_result"
          collect_result "backend-api-regression" "$backend_api_regression_result"
          collect_result "backend-auth-security-regression" "$backend_auth_security_regression_result"

          overall="PASS"
          if [ "${#failed_jobs[@]}" -gt 0 ]; then
            overall="FAIL"
          fi

          print_details() {
            local job_name="$1"
            local log_file="ci-output/${job_name}.log"

            if [ ! -f "$log_file" ] && [ -f "ci-output/ci-output/${job_name}.log" ]; then
              log_file="ci-output/ci-output/${job_name}.log"
            fi

            echo "[${job_name}]"
            if [ -f "$log_file" ]; then
              cat "$log_file"
            else
              echo "no failure log"
            fi
            echo
          }

          {
            echo "=================================================="
            echo "BACKEND CI FAILURE SUMMARY"
            echo "=================================================="
            echo
            echo "OVERALL RESULT: ${overall}"
            echo
            echo "FAILED JOBS:"
            if [ "${#failed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${failed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "PASSED JOBS:"
            if [ "${#passed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${passed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "DETAILS:"
            echo

            print_details "backend-typecheck"
            print_details "backend-build-api"
            print_details "backend-api-tests"
            print_details "backend-api-regression"
            print_details "backend-auth-security-regression"

            echo "=================================================="
          } | tee backend-ci-failure-summary.txt

          {
            echo '```text'
            cat backend-ci-failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
