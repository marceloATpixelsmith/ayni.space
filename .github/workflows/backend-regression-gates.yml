name: Backend Regression Gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-typecheck
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-typecheck.log"
          {
            echo "Failing command: pnpm -w typecheck"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm -w typecheck 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-typecheck failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck.log
          if-no-files-found: error

  backend-build-api:
    name: backend-build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-build-api
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-build-api.log"
          {
            echo "Failing command: pnpm --filter @workspace/api-server run build"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm --filter @workspace/api-server run build 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-build-api failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api.log
          if-no-files-found: error

  backend-api-tests:
    name: backend-api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-api-tests
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-api-tests.log"
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:ci"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm --filter @workspace/api-server run test:ci 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-api-tests failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests.log
          if-no-files-found: error

  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-typecheck
      - backend-build-api
      - backend-api-tests
    steps:
      - name: Download backend-typecheck failure artifact
        if: needs.backend-typecheck.result != 'success'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck

      - name: Download backend-build-api failure artifact
        if: needs.backend-build-api.result != 'success'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api

      - name: Download backend-api-tests failure artifact
        if: needs.backend-api-tests.result != 'success'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests

      - name: Print backend CI summary
        env:
          TYPECHECK_RESULT: ${{ needs.backend-typecheck.result }}
          BUILD_API_RESULT: ${{ needs.backend-build-api.result }}
          API_TESTS_RESULT: ${{ needs.backend-api-tests.result }}
        run: |
          set -euo pipefail

          failed_jobs=()
          passed_jobs=()
          for job in backend-typecheck backend-build-api backend-api-tests; do
            case "$job" in
              backend-typecheck) result="$TYPECHECK_RESULT" ;;
              backend-build-api) result="$BUILD_API_RESULT" ;;
              backend-api-tests) result="$API_TESTS_RESULT" ;;
            esac
            if [ "$result" = "success" ]; then
              passed_jobs+=("$job")
            else
              failed_jobs+=("$job")
            fi
          done

          if [ "${#failed_jobs[@]}" -eq 0 ]; then
            overall="PASS"
          else
            overall="FAIL"
          fi

          print_jobs() {
            if [ "$#" -eq 0 ]; then
              echo "- none"
              return
            fi
            for job in "$@"; do
              echo "- $job"
            done
          }

          log_for_job() {
            local job="$1"
            local candidate="ci-output/${job}/${job}.log"
            if [ -f "$candidate" ]; then
              printf '%s' "$candidate"
              return
            fi

            local found
            found="$(find ci-output -type f -name "${job}.log" | head -n 1 || true)"
            if [ -n "$found" ] && [ -f "$found" ]; then
              printf '%s' "$found"
              return
            fi

            printf ''
          }

          print_detail() {
            local job="$1"
            local log_path
            log_path="$(log_for_job "$job")"

            if [ -z "$log_path" ]; then
              echo "no failure log"
              return
            fi

            if [ "$job" = "backend-api-tests" ]; then
              if grep -q "✖ failing tests:" "$log_path"; then
                awk '
                  /✖ failing tests:/{flag=1}
                  flag {
                    if (/^[[:space:]]*[0-9]+ pass/ || /^[[:space:]]*[0-9]+ fail/ || /^Done in / || /^Exit code:/) exit
                    print
                  }
                ' "$log_path" | grep -E "✖ failing tests:|AssertionError|Expected:|Received:|Difference:|^- .*|^[[:space:]]+[-+].*" | head -n 120
              else
                tail -n 40 "$log_path"
              fi
              echo "Full raw log: see backend-api-tests-failure-log artifact"
              return
            fi

            grep -E "Failing command:|Error:|ERROR|AssertionError|failed|Exit code:" "$log_path" | tail -n 20 || tail -n 20 "$log_path"
          }

          {
            echo "=================================================="
            echo "BACKEND CI FAILURE SUMMARY"
            echo "=================================================="
            echo
            echo "OVERALL RESULT: ${overall}"
            echo
            echo "FAILED JOBS:"
            print_jobs "${failed_jobs[@]}"
            echo
            echo "PASSED JOBS:"
            print_jobs "${passed_jobs[@]}"
            echo
            echo "DETAILS:"
            echo
            echo "[backend-typecheck]"
            print_detail "backend-typecheck"
            echo
            echo "[backend-build-api]"
            print_detail "backend-build-api"
            echo
            echo "[backend-api-tests]"
            print_detail "backend-api-tests"
            echo
            echo "=================================================="
          } | tee backend-ci-failure-summary.txt

          {
            echo '```text'
            cat backend-ci-failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$overall" = "FAIL" ]; then
            exit 1
          fi
