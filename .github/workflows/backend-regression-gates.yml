name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        id: run_gate
        continue-on-error: true
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/typecheck.log"
          command="pnpm -w typecheck"
          {
            echo "Failing command: ${command}"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          $command 2>&1 | tee -a "$log_file"
          status=$?

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload failure log
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-failure-log
          path: ci-output/typecheck.log
          if-no-files-found: error
      - name: Fail job when gate fails
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        run: exit 1

  build-api:
    name: build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build API server
        id: run_gate
        continue-on-error: true
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/build-api.log"
          command="pnpm --filter @workspace/api-server run build"
          {
            echo "Failing command: ${command}"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          $command 2>&1 | tee -a "$log_file"
          status=$?

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload failure log
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-api-failure-log
          path: ci-output/build-api.log
          if-no-files-found: error
      - name: Fail job when gate fails
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        run: exit 1

  api-tests:
    name: api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API tests
        id: run_gate
        continue-on-error: true
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/api-tests.log"
          command="pnpm --filter @workspace/api-server run test:ci"
          {
            echo "Failing command: ${command}"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          $command 2>&1 | tee -a "$log_file"
          status=$?

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload failure log
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-tests-failure-log
          path: ci-output/api-tests.log
          if-no-files-found: error
      - name: Fail job when gate fails
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        run: exit 1

  api-regression:
    name: api-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API regression tests
        id: run_gate
        continue-on-error: true
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/api-regression.log"
          command="pnpm --filter @workspace/api-server run test:regression:ci"
          {
            echo "Failing command: ${command}"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          $command 2>&1 | tee -a "$log_file"
          status=$?

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload failure log
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-regression-failure-log
          path: ci-output/api-regression.log
          if-no-files-found: error
      - name: Fail job when gate fails
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        run: exit 1

  auth-security-regression:
    name: auth-security-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run auth security regression tests
        id: run_gate
        continue-on-error: true
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/auth-security-regression.log"
          command="pnpm run test:auth-security-regression"
          {
            echo "Failing command: ${command}"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          $command 2>&1 | tee -a "$log_file"
          status=$?

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
      - name: Upload failure log
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: auth-security-regression-failure-log
          path: ci-output/auth-security-regression.log
          if-no-files-found: error
      - name: Fail job when gate fails
        if: ${{ steps.run_gate.outputs.exit_code != '0' }}
        run: exit 1

  summary:
    name: CI Failure Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - typecheck
      - build-api
      - api-tests
      - api-regression
      - auth-security-regression
    steps:
      - name: Download failure artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: ci-output
          pattern: "*-failure-log"
          merge-multiple: true

      - name: Print consolidated summary
        run: |
          typecheck_result="${{ needs.typecheck.result }}"
          build_api_result="${{ needs.build-api.result }}"
          api_tests_result="${{ needs.api-tests.result }}"
          api_regression_result="${{ needs.api-regression.result }}"
          auth_security_result="${{ needs.auth-security-regression.result }}"

          failed_jobs=()
          passed_jobs=()

          collect_result() {
            local job_name="$1"
            local result="$2"
            if [ "$result" = "success" ]; then
              passed_jobs+=("$job_name")
            else
              failed_jobs+=("$job_name")
            fi
          }

          collect_result "typecheck" "$typecheck_result"
          collect_result "build-api" "$build_api_result"
          collect_result "api-tests" "$api_tests_result"
          collect_result "api-regression" "$api_regression_result"
          collect_result "auth-security-regression" "$auth_security_result"

          overall="PASS"
          if [ "${#failed_jobs[@]}" -gt 0 ]; then
            overall="FAIL"
          fi

          {
            echo "=================================================="
            echo "CI FAILURE SUMMARY"
            echo "=================================================="
            echo
            echo "OVERALL RESULT: ${overall}"
            echo
            echo "FAILED JOBS:"
            if [ "${#failed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${failed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "DETAILS:"
            echo

            for job in "${failed_jobs[@]}"; do
              echo "[${job}]"
              log_file="ci-output/${job}.log"
              if [ -f "$log_file" ]; then
                cat "$log_file"
              else
                echo "No failure log artifact found for ${job}."
              fi
              echo
            done

            echo "---"
            echo
            echo "PASSED JOBS:"
            if [ "${#passed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${passed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "=================================================="
          } | tee ci-failure-summary.txt

          {
            echo '```text'
            cat ci-failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
