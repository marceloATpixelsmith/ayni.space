name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm -w typecheck

      - run: pnpm --filter @workspace/api-server build

      - run: pnpm --filter @workspace/api-server test

      - name: Run dedicated Phase A API regression suite
        run: pnpm test:api-regression
