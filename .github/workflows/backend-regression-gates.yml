name: Backend Regression Gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Reset pnpm store before install
        run: |
          STORE_PATH="$(pnpm store path --silent)"
          rm -rf "$STORE_PATH"
          mkdir -p "$STORE_PATH"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-typecheck
        run: |
          mkdir -p ci-output
          LOG_FILE="ci-output/backend-typecheck.log"
          COMMAND="pnpm -w typecheck"
          {
            echo "Failing command: $COMMAND"
            echo "----------------------------------------"
          } > "$LOG_FILE"
          set +e
          $COMMAND 2>&1 | tee -a "$LOG_FILE"
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "----------------------------------------" >> "$LOG_FILE"
          echo "Exit code: $STATUS" >> "$LOG_FILE"
          if [ "$STATUS" -ne 0 ]; then
            node scripts/ci/extract-failure-summary.mjs "$LOG_FILE" | tee -a "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi
      - name: Upload backend-typecheck failure log
        if: ${{ failure() && hashFiles('ci-output/backend-typecheck.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck.log
          if-no-files-found: error

  backend-build-api:
    name: backend-build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Reset pnpm store before install
        run: |
          STORE_PATH="$(pnpm store path --silent)"
          rm -rf "$STORE_PATH"
          mkdir -p "$STORE_PATH"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-build-api
        run: |
          mkdir -p ci-output
          LOG_FILE="ci-output/backend-build-api.log"
          COMMAND="pnpm --filter @workspace/api-server run build"
          {
            echo "Failing command: $COMMAND"
            echo "----------------------------------------"
          } > "$LOG_FILE"
          set +e
          $COMMAND 2>&1 | tee -a "$LOG_FILE"
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "----------------------------------------" >> "$LOG_FILE"
          echo "Exit code: $STATUS" >> "$LOG_FILE"
          if [ "$STATUS" -ne 0 ]; then
            node scripts/ci/extract-failure-summary.mjs "$LOG_FILE" | tee -a "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi
      - name: Upload backend-build-api failure log
        if: ${{ failure() && hashFiles('ci-output/backend-build-api.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api.log
          if-no-files-found: error

  backend-api-tests:
    name: backend-api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Reset pnpm store before install
        run: |
          STORE_PATH="$(pnpm store path --silent)"
          rm -rf "$STORE_PATH"
          mkdir -p "$STORE_PATH"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-api-tests
        run: |
          mkdir -p ci-output
          LOG_FILE="ci-output/backend-api-tests.log"
          COMMAND="pnpm --filter @workspace/api-server run test:ci"
          {
            echo "Failing command: $COMMAND"
            echo "----------------------------------------"
          } > "$LOG_FILE"
          set +e
          $COMMAND 2>&1 | tee -a "$LOG_FILE"
          STATUS=${PIPESTATUS[0]}
          set -e
          echo "----------------------------------------" >> "$LOG_FILE"
          echo "Exit code: $STATUS" >> "$LOG_FILE"
          if [ "$STATUS" -ne 0 ]; then
            node scripts/ci/extract-failure-summary.mjs "$LOG_FILE" | tee -a "$GITHUB_STEP_SUMMARY"
            exit "$STATUS"
          fi
      - name: Upload backend-api-tests failure log
        if: ${{ failure() && hashFiles('ci-output/backend-api-tests.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests.log
          if-no-files-found: error
