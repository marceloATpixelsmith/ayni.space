name: Backend Regression Gates

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-typecheck
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-typecheck.log"
          {
            echo "Failing command: pnpm -w typecheck"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm -w typecheck 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-typecheck failure log
        if: ${{ failure() && hashFiles('ci-output/backend-typecheck.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck.log
          if-no-files-found: error

  backend-build-api:
    name: backend-build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-build-api
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-build-api.log"
          {
            echo "Failing command: pnpm --filter @workspace/api-server run build"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm --filter @workspace/api-server run build 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-build-api failure log
        if: ${{ failure() && hashFiles('ci-output/backend-build-api.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api.log
          if-no-files-found: error

  backend-api-tests:
    name: backend-api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run backend-api-tests
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-api-tests.log"
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:ci"
            echo "----------------------------------------"
          } > "$log_file"
          set -o pipefail
          pnpm --filter @workspace/api-server run test:ci 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}
          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          if [ "$status" -ne 0 ]; then
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload backend-api-tests failure log
        if: ${{ failure() && hashFiles('ci-output/backend-api-tests.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests.log
          if-no-files-found: error
