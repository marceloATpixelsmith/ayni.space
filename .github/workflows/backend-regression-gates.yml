name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-gates:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BACKEND_TRACE_VERBOSE: "0"
      CI: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        id: install_deps
        run: pnpm install --frozen-lockfile

      - name: Create backend logs directory
        run: mkdir -p artifacts/backend-gates

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm -w typecheck 2>&1 | tee artifacts/backend-gates/typecheck.log
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build API Server
        id: build
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm --filter @workspace/api-server build 2>&1 | tee artifacts/backend-gates/build.log
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run API Test Suite
        id: api_tests
        continue-on-error: true
        run: |
          set +e
          set -o pipefail

          run_api_tests() {
            local log_file="$1"
            pnpm --filter @workspace/api-server run test:ci 2>&1 | tee -a "$log_file"
            return $?
          }

          status=0
          : > artifacts/backend-gates/api-tests.log
          if run_api_tests artifacts/backend-gates/api-tests.log; then
            echo "api-tests passed on first attempt"
          else
            first_status=$?
            echo "api-tests first attempt failed with exit code: $first_status"
            echo "Retrying API tests once to reduce transient CI flakes..."
            echo "--- RETRY ---" | tee -a artifacts/backend-gates/api-tests.log

            if run_api_tests artifacts/backend-gates/api-tests.log; then
              echo "api-tests passed on retry"
            else
              status=$?
            fi
          fi

          echo "api-tests exit code: $status"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run API Regression Suite (Phase A)
        id: regression
        continue-on-error: true
        run: |
          set +e
          set -o pipefail
          pnpm --filter @workspace/api-server run test:regression:ci 2>&1 | tee artifacts/backend-gates/api-regression.log
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: CI Failure Summary
        id: ci_summary
        if: always()
        run: |
          typecheck_outcome="${{ steps.typecheck.outcome || 'unknown' }}"
          typecheck_exit="${{ steps.typecheck.outputs.exit_code || 'N/A' }}"
          build_outcome="${{ steps.build.outcome || 'unknown' }}"
          build_exit="${{ steps.build.outputs.exit_code || 'N/A' }}"
          api_tests_outcome="${{ steps.api_tests.outcome || 'unknown' }}"
          api_tests_exit="${{ steps.api_tests.outputs.exit_code || 'N/A' }}"
          regression_outcome="${{ steps.regression.outcome || 'unknown' }}"
          regression_exit="${{ steps.regression.outputs.exit_code || 'N/A' }}"

          emit_log() {
            local outcome="$1"
            local exit_code="$2"
            local title="$3"
            local log_path="$4"

            echo "${title} (outcome=${outcome}, exit=${exit_code})"
            if [ -f "$log_path" ]; then
              tail -n 250 "$log_path"
            else
              echo "No log captured."
            fi
            echo
          }

          {
            echo '```text'
            emit_log "$typecheck_outcome" "$typecheck_exit" "TYPECHECK" "artifacts/backend-gates/typecheck.log"
            emit_log "$build_outcome" "$build_exit" "BUILD" "artifacts/backend-gates/build.log"
            emit_log "$api_tests_outcome" "$api_tests_exit" "API TESTS" "artifacts/backend-gates/api-tests.log"
            emit_log "$regression_outcome" "$regression_exit" "API REGRESSION" "artifacts/backend-gates/api-regression.log"
            echo '```'
          } > "$GITHUB_STEP_SUMMARY"

      - name: Fail job if any backend gate failed
        if: always()
        run: |
          if [ "${{ steps.install_deps.outcome }}" != "success" ]; then
            echo "FAILED STEP: Install dependencies (id: install_deps)"
            echo "Backend regression gates failed before backend command gates could execute."
            exit 1
          fi

          should_fail_step() {
            local outcome="$1"
            local exit_code="$2"

            if [ "$outcome" = "failure" ]; then
              return 0
            fi

            if [[ "$exit_code" =~ ^[0-9]+$ ]] && [ "$exit_code" -ne 0 ]; then
              return 0
            fi

            if [ "$outcome" = "cancelled" ]; then
              return 0
            fi

            return 1
          }

          typecheck_outcome="${{ steps.typecheck.outcome }}"
          typecheck_exit="${{ steps.typecheck.outputs.exit_code || '0' }}"
          build_outcome="${{ steps.build.outcome }}"
          build_exit="${{ steps.build.outputs.exit_code || '0' }}"
          api_tests_outcome="${{ steps.api_tests.outcome }}"
          api_tests_exit="${{ steps.api_tests.outputs.exit_code || '0' }}"
          regression_outcome="${{ steps.regression.outcome }}"
          regression_exit="${{ steps.regression.outputs.exit_code || '0' }}"

          echo "typecheck: outcome=$typecheck_outcome, exit_code=$typecheck_exit"
          echo "build: outcome=$build_outcome, exit_code=$build_exit"
          echo "api-tests: outcome=$api_tests_outcome, exit_code=$api_tests_exit"
          echo "api-regression: outcome=$regression_outcome, exit_code=$regression_exit"

          failed=0

          if should_fail_step "$typecheck_outcome" "$typecheck_exit"; then
            echo "FAILED STEP: Typecheck (id: typecheck, exit: ${{ steps.typecheck.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$build_outcome" "$build_exit"; then
            echo "FAILED STEP: Build API Server (id: build, exit: ${{ steps.build.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$api_tests_outcome" "$api_tests_exit"; then
            echo "FAILED STEP: Run API Test Suite (id: api_tests, exit: ${{ steps.api_tests.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$regression_outcome" "$regression_exit"; then
            echo "FAILED STEP: Run API Regression Suite (Phase A) (id: regression, exit: ${{ steps.regression.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Backend regression gates failed."
            exit 1
          fi
