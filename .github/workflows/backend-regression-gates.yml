name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/**"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/**"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-typecheck:
    name: backend-typecheck
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run typecheck
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-typecheck.log"
          command=(pnpm -w typecheck)
          {
            echo "Failing command: pnpm -w typecheck"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Typecheck failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-failure-log
          path: ci-output/backend-typecheck.log
          if-no-files-found: error

  backend-build-api:
    name: backend-build-api
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build API server
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-build-api.log"
          command=(pnpm --filter @workspace/api-server run build)
          {
            echo "Failing command: pnpm --filter @workspace/api-server run build"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Build failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-api-failure-log
          path: ci-output/backend-build-api.log
          if-no-files-found: error

  backend-api-tests:
    name: backend-api-tests
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API tests
        id: run_gate
        run: |
          mkdir -p ci-output
          log_file="ci-output/backend-api-tests.log"
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:ci"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          pnpm --filter @workspace/api-server run test:ci 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "API tests failed. Full captured output:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-tests-failure-log
          path: ci-output/backend-api-tests.log
          if-no-files-found: error

  backend-api-regression:
    name: backend-api-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run API regression tests
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-api-regression.log"
          command=(pnpm --filter @workspace/api-server run test:regression:ci)
          {
            echo "Failing command: pnpm --filter @workspace/api-server run test:regression:ci"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "API regression tests failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-regression-failure-log
          path: ci-output/backend-api-regression.log
          if-no-files-found: error

  backend-auth-security-regression:
    name: backend-auth-security-regression
    runs-on: ubuntu-latest
    env:
      CI: "true"
      BACKEND_TRACE_VERBOSE: "0"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run auth security regression tests
        id: run_gate
        run: |
          set +e
          mkdir -p ci-output
          log_file="ci-output/backend-auth-security-regression.log"
          command=(pnpm run test:auth-security-regression)
          {
            echo "Failing command: pnpm run test:auth-security-regression"
            echo "----------------------------------------"
          } > "$log_file"

          set -o pipefail
          "${command[@]}" 2>&1 | tee -a "$log_file"
          status=${PIPESTATUS[0]}

          echo "----------------------------------------" >> "$log_file"
          echo "Exit code: $status" >> "$log_file"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          if [ "$status" -ne 0 ]; then
            echo "Auth security regression tests failed; replaying captured log:"
            cat "$log_file"
          fi
          exit "$status"
      - name: Upload failure log
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-auth-security-regression-failure-log
          path: ci-output/backend-auth-security-regression.log
          if-no-files-found: error

  backend-ci-summary:
    name: backend-ci-summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - backend-typecheck
      - backend-build-api
      - backend-api-tests
      - backend-api-regression
      - backend-auth-security-regression
    steps:
      - name: Prepare summary workspace
        run: mkdir -p ci-output

      - name: Download failure artifacts
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: backend-*-failure-log
          path: ci-output
          merge-multiple: true

      - name: Print consolidated backend summary
        env:
          BACKEND_TYPECHECK_RESULT: ${{ needs['backend-typecheck'].result }}
          BACKEND_BUILD_API_RESULT: ${{ needs['backend-build-api'].result }}
          BACKEND_API_TESTS_RESULT: ${{ needs['backend-api-tests'].result }}
          BACKEND_API_REGRESSION_RESULT: ${{ needs['backend-api-regression'].result }}
          BACKEND_AUTH_SECURITY_REGRESSION_RESULT: ${{ needs['backend-auth-security-regression'].result }}
        run: |
          set -euo pipefail

          jobs=(
            "backend-typecheck|$BACKEND_TYPECHECK_RESULT"
            "backend-build-api|$BACKEND_BUILD_API_RESULT"
            "backend-api-tests|$BACKEND_API_TESTS_RESULT"
            "backend-api-regression|$BACKEND_API_REGRESSION_RESULT"
            "backend-auth-security-regression|$BACKEND_AUTH_SECURITY_REGRESSION_RESULT"
          )

          failed_jobs=()
          passed_jobs=()
          overall="PASS"

          for item in "${jobs[@]}"; do
            job_name="${item%%|*}"
            job_result="${item##*|}"
            if [ "$job_result" = "success" ]; then
              passed_jobs+=("$job_name")
            else
              failed_jobs+=("$job_name")
              overall="FAIL"
            fi
          done

          {
            echo "=================================================="
            echo "BACKEND CI FAILURE SUMMARY"
            echo "=================================================="
            echo
            echo "OVERALL RESULT: ${overall}"
            echo
            echo "FAILED JOBS:"
            if [ "${#failed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${failed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "PASSED JOBS:"
            if [ "${#passed_jobs[@]}" -eq 0 ]; then
              echo "- none"
            else
              for job in "${passed_jobs[@]}"; do
                echo "- ${job}"
              done
            fi
            echo
            echo "DETAILS (actionable excerpts):"
            echo

            for job in "${failed_jobs[@]}"; do
              log_file="ci-output/${job}.log"
              echo "[${job}]"
              if [ -f "$log_file" ]; then
                grep -E "Failing command:|Error:|ERROR|AssertionError|✖|failed|Exit code:" "$log_file" | tail -n 25 || tail -n 25 "$log_file"
              else
                echo "No failure log artifact was available for this job."
              fi
              echo
            done

            echo "=================================================="
          } | tee backend-ci-failure-summary.txt

          {
            echo '```text'
            cat backend-ci-failure-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$overall" = "FAIL" ]; then
            exit 1
          fi
