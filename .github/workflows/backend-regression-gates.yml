name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-gates:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BACKEND_TRACE_VERBOSE: "0"
      CI: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create backend logs directory
        run: mkdir -p artifacts/backend-gates

      - name: Typecheck workspace
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm -w typecheck 2>&1 | tee artifacts/backend-gates/backend-typecheck.log
          exit ${PIPESTATUS[0]}

      - name: Build api-server
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @workspace/api-server build 2>&1 | tee artifacts/backend-gates/backend-build.log
          exit ${PIPESTATUS[0]}

      - name: Run api-server test suite
        id: api_tests
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @workspace/api-server run test:ci 2>&1 | tee artifacts/backend-gates/backend-test.log
          exit ${PIPESTATUS[0]}

      - name: Run dedicated Phase A API regression suite
        id: regression
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @workspace/api-server run test:regression:ci 2>&1 | tee artifacts/backend-gates/backend-regression.log
          exit ${PIPESTATUS[0]}

      - name: Backend gate failure summary (action output + step summary)
        if: always()
        run: |
          summarize_if_failed() {
            local outcome="$1"
            local log_path="$2"
            local output_path="$3"
            local step_name="$4"
            local command="$5"

            if [ "$outcome" = "success" ]; then
              return
            fi

            node scripts/ci/summarize-backend-test-failures.mjs \
              "$log_path" \
              "$output_path" \
              --step-name "$step_name" \
              --command "$command" \
              --step-summary "$GITHUB_STEP_SUMMARY"
          }

          summarize_if_failed "${{ steps.typecheck.outcome }}" \
            artifacts/backend-gates/backend-typecheck.log \
            artifacts/backend-gates/backend-typecheck-failure-summary.txt \
            "Typecheck workspace" \
            "pnpm -w typecheck"

          summarize_if_failed "${{ steps.build.outcome }}" \
            artifacts/backend-gates/backend-build.log \
            artifacts/backend-gates/backend-build-failure-summary.txt \
            "Build api-server" \
            "pnpm --filter @workspace/api-server build"

          summarize_if_failed "${{ steps.api_tests.outcome }}" \
            artifacts/backend-gates/backend-test.log \
            artifacts/backend-gates/backend-test-failure-summary.txt \
            "Run api-server test suite" \
            "pnpm --filter @workspace/api-server run test:ci"

          summarize_if_failed "${{ steps.regression.outcome }}" \
            artifacts/backend-gates/backend-regression.log \
            artifacts/backend-gates/backend-regression-failure-summary.txt \
            "Run dedicated Phase A API regression suite" \
            "pnpm --filter @workspace/api-server run test:regression:ci"

          if [ "${{ steps.typecheck.outcome }}" = "success" ] && \
             [ "${{ steps.build.outcome }}" = "success" ] && \
             [ "${{ steps.api_tests.outcome }}" = "success" ] && \
             [ "${{ steps.regression.outcome }}" = "success" ]; then
            echo "All backend gate steps passed; no failure summary required." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backend gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: artifacts/backend-gates/backend-test.log
          if-no-files-found: warn

      - name: Upload backend typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-log
          path: artifacts/backend-gates/backend-typecheck.log
          if-no-files-found: warn

      - name: Upload backend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: artifacts/backend-gates/backend-build.log
          if-no-files-found: warn

      - name: Upload backend regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-log
          path: artifacts/backend-gates/backend-regression.log
          if-no-files-found: warn

      - name: Upload backend parsed failure summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-failure-summaries
          path: |
            artifacts/backend-gates/backend-typecheck-failure-summary.txt
            artifacts/backend-gates/backend-build-failure-summary.txt
            artifacts/backend-gates/backend-test-failure-summary.txt
            artifacts/backend-gates/backend-regression-failure-summary.txt
          if-no-files-found: warn

      - name: Fail job if any backend gate failed
        if: always()
        run: |
          if [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.build.outcome }}" != "success" ] || \
             [ "${{ steps.api_tests.outcome }}" != "success" ] || \
             [ "${{ steps.regression.outcome }}" != "success" ]; then
            echo "One or more backend gate steps failed."
            exit 1
          fi
