name: Backend CI (Non-blocking)

on:
  push:
    branches: [ master ]

jobs:
  test-backend:
    name: Run backend validation (non-blocking)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies (NO frozen lockfile)
        run: pnpm install --no-frozen-lockfile

      - name: Run backend validation (do not fail deploy)
        run: pnpm --filter @workspace/api-server run build || echo "Build failed but continuing"
