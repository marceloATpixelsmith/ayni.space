name: Backend Regression Gates

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  push:
    branches: [master]
    paths:
      - "apps/api-server/**"
      - "lib/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/backend-regression-gates.yml"
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  backend-gates:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BACKEND_TRACE_VERBOSE: "0"
      CI: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        id: install_deps
        run: pnpm install --frozen-lockfile

      - name: Create backend logs directory
        run: mkdir -p artifacts/backend-gates

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm -w typecheck 2>&1 | tee artifacts/backend-gates/backend-typecheck.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Build API Server
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @workspace/api-server build 2>&1 | tee artifacts/backend-gates/backend-build.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run API Test Suite
        id: api_tests
        continue-on-error: true
        run: |
          set -euo pipefail

          run_api_tests() {
            local log_file="$1"
            if pnpm --filter @workspace/api-server run test:ci 2>&1 | tee "$log_file"; then
              return 0
            fi
            return $?
          }

          status=0
          if run_api_tests artifacts/backend-gates/backend-test.log; then
            echo "api-tests passed on first attempt"
          else
            first_status=$?
            echo "api-tests first attempt failed with exit code: $first_status"
            echo "Retrying API tests once to reduce transient CI flakes..."

            if run_api_tests artifacts/backend-gates/backend-test-retry.log; then
              echo "api-tests passed on retry"
            else
              status=$?
            fi
          fi

          echo "api-tests exit code: $status"
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Run API Regression Suite (Phase A)
        id: regression
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @workspace/api-server run test:regression:ci 2>&1 | tee artifacts/backend-gates/backend-regression.log
          status=${PIPESTATUS[0]}
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Backend gate failure summary (action output + step summary)
        if: always()
        run: |
          summarize_if_failed() {
            local outcome="$1"
            local log_path="$2"
            local output_path="$3"
            local step_name="$4"
            local command="$5"

            if [ "$outcome" = "success" ]; then
              return
            fi

            node scripts/ci/summarize-backend-test-failures.mjs \
              "$log_path" \
              "$output_path" \
              --step-name "$step_name" \
              --command "$command" \
              --step-summary "$GITHUB_STEP_SUMMARY"
          }

          summarize_if_failed "${{ steps.typecheck.outcome }}" \
            artifacts/backend-gates/backend-typecheck.log \
            artifacts/backend-gates/backend-typecheck-failure-summary.txt \
            "Typecheck" \
            "pnpm -w typecheck"

          summarize_if_failed "${{ steps.build.outcome }}" \
            artifacts/backend-gates/backend-build.log \
            artifacts/backend-gates/backend-build-failure-summary.txt \
            "Build API Server" \
            "pnpm --filter @workspace/api-server build"

          summarize_if_failed "${{ steps.api_tests.outcome }}" \
            artifacts/backend-gates/backend-test.log \
            artifacts/backend-gates/backend-test-failure-summary.txt \
            "Run API Test Suite" \
            "pnpm --filter @workspace/api-server run test:ci"

          summarize_if_failed "${{ steps.regression.outcome }}" \
            artifacts/backend-gates/backend-regression.log \
            artifacts/backend-gates/backend-regression-failure-summary.txt \
            "Run API Regression Suite (Phase A)" \
            "pnpm --filter @workspace/api-server run test:regression:ci"

          if [ "${{ steps.typecheck.outcome }}" = "success" ] && \
             [ "${{ steps.build.outcome }}" = "success" ] && \
             [ "${{ steps.api_tests.outcome }}" = "success" ] && \
             [ "${{ steps.regression.outcome }}" = "success" ]; then
            echo "All backend gate steps passed; no failure summary required." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload backend gate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-log
          path: |
            artifacts/backend-gates/backend-test.log
            artifacts/backend-gates/backend-test-retry.log
          if-no-files-found: warn

      - name: Upload backend typecheck log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-typecheck-log
          path: artifacts/backend-gates/backend-typecheck.log
          if-no-files-found: warn

      - name: Upload backend build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-log
          path: artifacts/backend-gates/backend-build.log
          if-no-files-found: warn

      - name: Upload backend regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-log
          path: artifacts/backend-gates/backend-regression.log
          if-no-files-found: warn

      - name: Upload backend parsed failure summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-failure-summaries
          path: |
            artifacts/backend-gates/backend-typecheck-failure-summary.txt
            artifacts/backend-gates/backend-build-failure-summary.txt
            artifacts/backend-gates/backend-test-failure-summary.txt
            artifacts/backend-gates/backend-regression-failure-summary.txt
          if-no-files-found: warn

      - name: Fail job if any backend gate failed
        if: always()
        run: |
          if [ "${{ steps.install_deps.outcome }}" != "success" ]; then
            echo "FAILED STEP: Install dependencies (id: install_deps)"
            echo "Backend regression gates failed before backend command gates could execute."
            exit 1
          fi

          should_fail_step() {
            local outcome="$1"
            local exit_code="$2"

            if [ "$outcome" = "failure" ]; then
              return 0
            fi

            if [[ "$exit_code" =~ ^[0-9]+$ ]] && [ "$exit_code" -ne 0 ]; then
              return 0
            fi

            if [ "$outcome" = "cancelled" ]; then
              return 0
            fi

            return 1
          }

          typecheck_outcome="${{ steps.typecheck.outcome }}"
          typecheck_exit="${{ steps.typecheck.outputs.exit_code || '0' }}"
          build_outcome="${{ steps.build.outcome }}"
          build_exit="${{ steps.build.outputs.exit_code || '0' }}"
          api_tests_outcome="${{ steps.api_tests.outcome }}"
          api_tests_exit="${{ steps.api_tests.outputs.exit_code || '0' }}"
          regression_outcome="${{ steps.regression.outcome }}"
          regression_exit="${{ steps.regression.outputs.exit_code || '0' }}"

          echo "typecheck: outcome=$typecheck_outcome, exit_code=$typecheck_exit"
          echo "build: outcome=$build_outcome, exit_code=$build_exit"
          echo "api-tests: outcome=$api_tests_outcome, exit_code=$api_tests_exit"
          echo "api-regression: outcome=$regression_outcome, exit_code=$regression_exit"

          failed=0

          if should_fail_step "$typecheck_outcome" "$typecheck_exit"; then
            echo "FAILED STEP: Typecheck (id: typecheck, exit: ${{ steps.typecheck.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$build_outcome" "$build_exit"; then
            echo "FAILED STEP: Build API Server (id: build, exit: ${{ steps.build.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$api_tests_outcome" "$api_tests_exit"; then
            echo "FAILED STEP: Run API Test Suite (id: api_tests, exit: ${{ steps.api_tests.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if should_fail_step "$regression_outcome" "$regression_exit"; then
            echo "FAILED STEP: Run API Regression Suite (Phase A) (id: regression, exit: ${{ steps.regression.outputs.exit_code || 'unknown' }})"
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Backend regression gates failed."
            exit 1
          fi
