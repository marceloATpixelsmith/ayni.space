name: Backend Regression Gates & Render Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_backend_deploy:
        description: "Force backend deploy intent even when backend scope is unchanged"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: backend-regression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-backend-scope:
    name: Detect backend deploy scope
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.filter.outputs.backend }}
      all_changed_files: ${{ steps.changed.outputs.all_changed_files }}
      matched_files: ${{ steps.filter.outputs.backend_files }}
      force_backend_deploy: ${{ steps.scope.outputs.force_backend_deploy }}
      deploy_requested: ${{ steps.scope.outputs.deploy_requested }}
      deploy_reason: ${{ steps.scope.outputs.deploy_reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files for logging
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]] && [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")
          else
            changed_files=$(git show --pretty="" --name-only "$GITHUB_SHA")
          fi

          if [[ -z "$changed_files" ]]; then
            changed_files="<none>"
          fi

          {
            echo "all_changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Debug raw changed files before scope filter
        env:
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.event.before=${{ github.event.before }}"
          echo "raw_changed_files_from_git_diff:"
          printf '%s\n' "$ALL_CHANGED_FILES"

      - name: Detect changed backend files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            backend:
              - 'apps/api-server/**'
              - 'lib/db/**'
              - 'lib/api-spec/**'
              - 'lib/api-zod/**'
              - 'packages/**'
              - 'scripts/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/backend-regression-gates.yml'
              - '.github/workflows/**'

      - name: Decide deploy intent
        id: scope
        env:
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FORCE_BACKEND_DEPLOY_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.force_backend_deploy || false }}
        run: |
          set -euo pipefail

          deploy_requested=false
          deploy_reason="No backend-scope changes detected and force_backend_deploy=false"

          if [[ "$BACKEND_CHANGED" == "true" ]]; then
            deploy_requested=true
            deploy_reason="Backend-scope files changed"
          elif [[ "$FORCE_BACKEND_DEPLOY_INPUT" == "true" ]]; then
            deploy_requested=true
            deploy_reason="Manual workflow_dispatch with force_backend_deploy=true"
          fi

          echo "force_backend_deploy=$FORCE_BACKEND_DEPLOY_INPUT" >> "$GITHUB_OUTPUT"
          echo "deploy_requested=$deploy_requested" >> "$GITHUB_OUTPUT"
          echo "deploy_reason=$deploy_reason" >> "$GITHUB_OUTPUT"

      - name: Log backend scope decision
        env:
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
          MATCHED_FILES: ${{ steps.filter.outputs.backend_files }}
          BACKEND_CHANGED: ${{ steps.filter.outputs.backend }}
          FORCE_BACKEND_DEPLOY: ${{ steps.scope.outputs.force_backend_deploy }}
          DEPLOY_REQUESTED: ${{ steps.scope.outputs.deploy_requested }}
          DEPLOY_REASON: ${{ steps.scope.outputs.deploy_reason }}
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "all_changed_files=${ALL_CHANGED_FILES}"
          echo "matched_files=${MATCHED_FILES:-<none>}"
          echo "backend_changed=${BACKEND_CHANGED}"
          echo "force_backend_deploy=${FORCE_BACKEND_DEPLOY}"
          echo "deploy_requested=${DEPLOY_REQUESTED}"
          echo "reason=${DEPLOY_REASON}"

  backend-regression:
    name: Backend build/typecheck/test/codegen validation
    runs-on: ubuntu-latest
    needs:
      - detect-backend-scope
    if: needs.detect-backend-scope.outputs.deploy_requested == 'true'

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ayni_test
      SESSION_SECRET: test-session-secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:3000/api/auth/google/callback
      ALLOWED_ORIGINS: http://localhost:3000
      STRIPE_WEBHOOK_SECRET: whsec_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Validate lockfile/install integrity
        run: pnpm install --frozen-lockfile

      - name: Build api-server
        run: pnpm --filter @workspace/api-server run build

      - name: Typecheck api-server
        run: pnpm --filter @workspace/api-server run typecheck

      - name: Run api-server backend tests
        run: pnpm --filter @workspace/api-server run test

      - name: Regenerate API contracts
        run: pnpm --filter @workspace/api-spec run codegen

      - name: Validate generated artifacts are up to date
        run: git diff --exit-code -- lib/api-client-react lib/api-zod

  log-backend-deploy-skip:
    name: Log backend deploy skip reason
    runs-on: ubuntu-latest
    needs:
      - detect-backend-scope
    if: needs.detect-backend-scope.outputs.deploy_requested != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "backend_changed=${{ needs.detect-backend-scope.outputs.backend_changed }}"
          echo "force_backend_deploy=${{ needs.detect-backend-scope.outputs.force_backend_deploy }}"
          echo "deploy_requested=${{ needs.detect-backend-scope.outputs.deploy_requested }}"
          echo "reason=${{ needs.detect-backend-scope.outputs.deploy_reason }}"
          echo "all_changed_files=${{ needs.detect-backend-scope.outputs.all_changed_files || '<none>' }}"
          echo "matched_files=${{ needs.detect-backend-scope.outputs.matched_files || '<none>' }}"

  log-backend-deploy-not-run:
    name: Log backend deploy job not run context
    runs-on: ubuntu-latest
    needs:
      - detect-backend-scope
      - backend-regression
    if: needs.detect-backend-scope.outputs.deploy_requested == 'true' && !(github.event_name == 'push' && github.ref == 'refs/heads/master')
    steps:
      - name: Explain deploy job skip condition
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "backend_changed=${{ needs.detect-backend-scope.outputs.backend_changed }}"
          echo "force_backend_deploy=${{ needs.detect-backend-scope.outputs.force_backend_deploy }}"
          echo "deploy_requested=${{ needs.detect-backend-scope.outputs.deploy_requested }}"
          echo "reason=${{ needs.detect-backend-scope.outputs.deploy_reason }}"
          echo "all_changed_files=${{ needs.detect-backend-scope.outputs.all_changed_files || '<none>' }}"
          echo "matched_files=${{ needs.detect-backend-scope.outputs.matched_files || '<none>' }}"
          echo "deploy_job_result=skipped"
          echo "deploy_job_skip_reason=Deployment only runs on push to refs/heads/master"

  deploy-backend-to-render:
    name: Deploy backend to Render via deploy hook
    runs-on: ubuntu-latest
    needs:
      - detect-backend-scope
      - backend-regression
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.detect-backend-scope.outputs.deploy_requested == 'true'

    steps:
      - name: Log deploy execution context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "backend_changed=${{ needs.detect-backend-scope.outputs.backend_changed }}"
          echo "force_backend_deploy=${{ needs.detect-backend-scope.outputs.force_backend_deploy }}"
          echo "deploy_requested=${{ needs.detect-backend-scope.outputs.deploy_requested }}"
          echo "deploy_reason=${{ needs.detect-backend-scope.outputs.deploy_reason }}"

      - name: Validate Render deploy hook secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [[ -z "${RENDER_DEPLOY_HOOK_URL}" ]]; then
            echo "::error::Missing required secret: RENDER_DEPLOY_HOOK_URL"
            echo "Render deployment blocked: RENDER_DEPLOY_HOOK_URL secret is not set."
            exit 1
          fi

      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --silent --show-error --location \
            --request POST \
            "$RENDER_DEPLOY_HOOK_URL"
