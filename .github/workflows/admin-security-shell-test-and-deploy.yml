name: Admin Frontend Test, Build & Deploy (Cloudflare Pages)

on:
  pull_request:
    paths:
      - "apps/admin/**"
      - "lib/api-client-react/**"
      - "lib/frontend-security/**"
      - "lib/frontend-observability/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/admin-security-shell-test-and-deploy.yml"
      - ".github/workflows/**"
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force frontend validation/deploy regardless of path changes"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: admin-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-frontend-scope:
    name: Detect frontend deploy scope
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      frontend_files: ${{ steps.filter.outputs.frontend_files }}
      deploy_requested: ${{ steps.decide.outputs.deploy_requested }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect frontend-relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            frontend:
              - 'apps/admin/**'
              - 'lib/api-client-react/**'
              - 'lib/frontend-security/**'
              - 'lib/frontend-observability/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/admin-security-shell-test-and-deploy.yml'
              - '.github/workflows/**'

      - name: Decide whether deploy path should run
        id: decide
        env:
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          FRONTEND_FILES: ${{ steps.filter.outputs.frontend_files }}
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy || false }}
        run: |
          set -euo pipefail

          echo "Frontend changed: ${FRONTEND_CHANGED}"
          if [[ -n "${FRONTEND_FILES}" ]]; then
            echo "Changed files that matched frontend scope:"
            printf '%s\n' "${FRONTEND_FILES}"
          else
            echo "No frontend-scope files matched on this event."
          fi

          deploy_requested="false"
          if [[ "${FORCE_DEPLOY}" == "true" ]]; then
            deploy_requested="true"
            echo "Manual override enabled via workflow_dispatch.force_deploy=true."
          elif [[ "${FRONTEND_CHANGED}" == "true" ]]; then
            deploy_requested="true"
            echo "Deploy path enabled because frontend-relevant files changed."
          else
            echo "Deploy path disabled: no frontend-relevant changes detected."
          fi

          echo "deploy_requested=${deploy_requested}" >> "$GITHUB_OUTPUT"

  test-and-build-admin:
    name: Run admin security tests and build
    runs-on: ubuntu-latest
    needs: detect-frontend-scope
    if: needs.detect-frontend-scope.outputs.deploy_requested == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security shell contract tests
        run: pnpm --filter @workspace/admin run test:security-shell

      - name: Build admin frontend
        run: pnpm --filter @workspace/admin run build

      - name: Upload admin build artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public
          if-no-files-found: error

  deploy-admin-to-cloudflare-pages:
    name: Deploy admin frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs:
      - detect-frontend-scope
      - test-and-build-admin
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && needs.detect-frontend-scope.outputs.deploy_requested == 'true'

    steps:
      - name: Explain deploy trigger
        run: |
          echo "Deploy is running because frontend deploy scope was enabled."
          echo "Matched frontend files:"
          printf '%s\n' "${{ needs.detect-frontend-scope.outputs.frontend_files }}"

      - name: Download admin build artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public

      - name: Deploy prebuilt frontend via Wrangler direct upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "Missing one or more required Cloudflare secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_PAGES_PROJECT_NAME"
            exit 1
          fi

          npx wrangler@4 pages deploy apps/admin/dist/public \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "production"
