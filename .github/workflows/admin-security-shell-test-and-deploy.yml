name: Admin Security Shell

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/admin/**"

  push:
    branches: [master]
    paths:
      - "apps/admin/**"

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/admin run test:security-shell

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
