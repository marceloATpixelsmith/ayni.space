name: Admin Frontend Tests

on:
  pull_request:
    branches: [master]
    paths:
      - "apps/admin/**"

permissions:
  contents: read

jobs:
  admin-security-shell-test:
    name: admin-security-shell-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @workspace/admin run test:security-shell

      - run: pnpm --filter @workspace/admin test
