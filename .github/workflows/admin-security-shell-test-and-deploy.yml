name: Admin Frontend Test, Build & Deploy (Cloudflare Pages)

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even when frontend scope is unchanged"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: admin-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-frontend-scope:
    name: Detect frontend deploy scope
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.filter.outputs.frontend }}
      all_changed_files: ${{ steps.changed.outputs.all_changed_files }}
      matched_files: ${{ steps.filter.outputs.frontend_files }}
      force_deploy: ${{ steps.scope.outputs.force_deploy }}
      deploy_requested: ${{ steps.scope.outputs.deploy_requested }}
      deploy_reason: ${{ steps.scope.outputs.deploy_reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files for logging
        id: changed
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]] && [[ -n "${BEFORE_SHA}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            changed_files=$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")
          else
            changed_files=$(git show --pretty="" --name-only "$GITHUB_SHA")
          fi

          {
            echo "all_changed_files<<EOF"
            if [[ -z "$changed_files" ]]; then
              echo "<none>"
            else
              printf '%s\n' "$changed_files"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Detect changed frontend files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            frontend:
              - 'apps/admin/**'
              - 'lib/api-client-react/**'
              - 'lib/frontend-security/**'
              - 'lib/frontend-observability/**'
              - 'packages/**'
              - 'scripts/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/admin-security-shell-test-and-deploy.yml'

      - name: Decide deploy intent
        id: scope
        env:
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          FORCE_DEPLOY_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy || false }}
        run: |
          set -euo pipefail

          deploy_requested=false
          deploy_reason="No frontend-scope changes detected and force_deploy=false"

          if [[ "$FRONTEND_CHANGED" == "true" ]]; then
            deploy_requested=true
            deploy_reason="Frontend-scope files changed"
          elif [[ "$FORCE_DEPLOY_INPUT" == "true" ]]; then
            deploy_requested=true
            deploy_reason="Manual workflow_dispatch with force_deploy=true"
          fi

          echo "force_deploy=$FORCE_DEPLOY_INPUT" >> "$GITHUB_OUTPUT"
          echo "deploy_requested=$deploy_requested" >> "$GITHUB_OUTPUT"
          echo "deploy_reason=$deploy_reason" >> "$GITHUB_OUTPUT"

      - name: Log frontend scope decision
        env:
          ALL_CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
          MATCHED_FILES: ${{ steps.filter.outputs.frontend_files }}
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          FORCE_DEPLOY_INPUT: ${{ steps.scope.outputs.force_deploy }}
          DEPLOY_REQUESTED: ${{ steps.scope.outputs.deploy_requested }}
          DEPLOY_REASON: ${{ steps.scope.outputs.deploy_reason }}
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "all_changed_files=${ALL_CHANGED_FILES}"
          echo "frontend_changed=${FRONTEND_CHANGED}"
          echo "force_deploy=${FORCE_DEPLOY_INPUT}"
          echo "deploy_requested=${DEPLOY_REQUESTED}"
          echo "reason=${DEPLOY_REASON}"
          echo "matched_files=${MATCHED_FILES:-<none>}"

  test-and-build-admin:
    name: Run admin security tests and build
    runs-on: ubuntu-latest
    needs:
      - detect-frontend-scope
    if: needs.detect-frontend-scope.outputs.deploy_requested == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security shell contract tests
        run: pnpm --filter @workspace/admin run test:security-shell

      - name: Build admin frontend
        run: pnpm --filter @workspace/admin run build

      - name: Upload admin build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public
          if-no-files-found: error

  log-admin-deploy-skip:
    name: Log admin deploy skip reason
    runs-on: ubuntu-latest
    needs:
      - detect-frontend-scope
    if: needs.detect-frontend-scope.outputs.deploy_requested != 'true'
    steps:
      - name: Explain skip
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "deploy_requested=${{ needs.detect-frontend-scope.outputs.deploy_requested }}"
          echo "reason=${{ needs.detect-frontend-scope.outputs.deploy_reason }}"
          echo "all_changed_files=${{ needs.detect-frontend-scope.outputs.all_changed_files || '<none>' }}"
          echo "matched_files=${{ needs.detect-frontend-scope.outputs.matched_files || '<none>' }}"

  deploy-admin-to-cloudflare-pages:
    name: Deploy admin frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs:
      - detect-frontend-scope
      - test-and-build-admin
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.detect-frontend-scope.outputs.deploy_requested == 'true'

    steps:
      - name: Log deploy execution context
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "deploy_requested=${{ needs.detect-frontend-scope.outputs.deploy_requested }}"
          echo "reason=${{ needs.detect-frontend-scope.outputs.deploy_reason }}"
          echo "all_changed_files=${{ needs.detect-frontend-scope.outputs.all_changed_files || '<none>' }}"
          echo "matched_files=${{ needs.detect-frontend-scope.outputs.matched_files || '<none>' }}"

      - name: Validate required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          set -euo pipefail
          missing=0

          for var in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_PAGES_PROJECT_NAME; do
            if [[ -z "${!var}" ]]; then
              echo "::error::Missing required Cloudflare secret: ${var}"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Cloudflare deployment blocked: one or more required secrets are missing."
            exit 1
          fi

      - name: Download admin build artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public

      - name: Deploy prebuilt frontend via Wrangler direct upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          npx wrangler@4 pages deploy apps/admin/dist/public \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "production"
