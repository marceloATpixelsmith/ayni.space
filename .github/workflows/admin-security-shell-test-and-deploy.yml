name: Admin Frontend Test, Build & Deploy (Cloudflare Pages)

on:
  pull_request:
    paths:
      - "apps/admin/**"
      - "lib/api-client-react/**"
      - "lib/frontend-security/**"
      - "lib/frontend-observability/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/admin-security-shell-test-and-deploy.yml"
  push:
    branches:
      - master
    paths:
      - "apps/admin/**"
      - "lib/api-client-react/**"
      - "lib/frontend-security/**"
      - "lib/frontend-observability/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/admin-security-shell-test-and-deploy.yml"

permissions:
  contents: read

concurrency:
  group: admin-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build-admin:
    name: Run admin security tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security shell contract tests
        run: pnpm --filter @workspace/admin run test:security-shell

      - name: Build admin frontend
        run: pnpm --filter @workspace/admin run build

      - name: Upload admin build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public
          if-no-files-found: error

  deploy-admin-to-cloudflare-pages:
    name: Deploy admin frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs:
      - test-and-build-admin
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Download admin build artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-frontend-build
          path: apps/admin/dist/public

      - name: Deploy prebuilt frontend via Wrangler direct upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ]; then
            echo "Cloudflare Pages secrets are not fully configured."
            exit 1
          fi

          npx wrangler@4 pages deploy apps/admin/dist/public \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "production"
