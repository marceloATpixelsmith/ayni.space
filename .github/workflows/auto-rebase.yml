name: Auto Rebase Codex PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase:
    if: startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - run: |
          git fetch origin master
          if ! git rebase origin/master; then
            git rebase --abort || true
            echo "::warning::Auto-rebase hit conflicts. Please run 'git fetch origin master && git rebase origin/master' locally and push."
            exit 0
          fi

      - run: git push --force-with-lease
