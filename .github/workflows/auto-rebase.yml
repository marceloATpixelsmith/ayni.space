name: Auto Rebase Codex PRs

on:
  pull_request:
    types: [opened, synchronize]
    branches: [master]

  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  rebase-pr:
    if: github.event_name == 'pull_request' && github.base_ref == 'master' && startsWith(github.head_ref, 'codex/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase current codex PR onto latest master
        run: |
          git fetch origin master
          git rebase origin/master
          git push --force-with-lease

  rebase-open-codex-prs-after-master-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Set git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rebase all open codex PRs onto latest master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --state open --json number,headRefName,baseRefName \
          | jq -c '.[]' \
          | while read -r pr; do
              branch=$(echo "$pr" | jq -r '.headRefName')
              base=$(echo "$pr" | jq -r '.baseRefName')

              if [[ "$branch" == codex/* && "$base" == "master" ]]; then
                rm -rf repo
                git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo
                cd repo
                git fetch origin master
                git checkout "$branch"
                git rebase origin/master
                git push --force-with-lease origin "$branch"
                cd ..
              fi
            done
