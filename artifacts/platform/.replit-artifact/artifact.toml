kind = "web"
previewPath = "/"
title = "SaaS Platform"
version = "1.0.0"
id = "artifacts/platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23633
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/platform run dev"

[services.env]
PORT = "23633"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/platform", "run", "build"]
publicDir = "artifacts/platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
