packages:
  "framer-motion": "Smooth page transitions and micro-interactions"
  "@hookform/resolvers": "Zod schema validation for complex forms"
  "react-hook-form": "Performant and accessible form state management"
  "date-fns": "Formatting dates in tables and headers"
  "recharts": "Analytics visualization for the admin dashboard"

images:
  - path: "artifacts/platform/public/images/auth-bg.png"
    description: "Abstract minimal 3d geometric shapes, soft lighting, gradient background in deep indigo and slate, professional premium corporate tech aesthetic"
    aspect_ratio: "16:9"
  - path: "artifacts/platform/public/images/logo.png"
    description: "Minimal modern geometric SaaS platform logo, interlocking blue and slate shapes, transparent background"
    aspect_ratio: "1:1"

notes:
  - Assumes backend is running at /api on the same domain (or handled via proxy)
  - Uses @workspace/api-client-react for generated Orval TanStack Query hooks
  - Relies on session cookies for authentication (handled automatically by browser and customFetch)
